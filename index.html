<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITO · AI 评分</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f5f5f0;
  --bg-surface:#ffffff;
  --bg-card:#ffffff;
  --bg-hover:#fafaf7;
  --bg-active:#f0efea;
  --border:#e8e7e2;
  --border-hover:#c9c5b8;
  --text:#1a1a18;
  --text-secondary:#6b6a65;
  --text-tertiary:#a09f99;
  --gold:#c9a962;
  --gold-hover:#b8984d;
  --gold-dim:rgba(201,169,98,0.10);
  --gold-glow:rgba(201,169,98,0.04);
  --success:#22c55e;
  --success-bg:rgba(34,197,94,0.08);
  --warning:#eab308;
  --warning-bg:rgba(234,179,8,0.08);
  --danger:#ef4444;
  --danger-bg:rgba(239,68,68,0.1);
  --radius:8px;
  --radius-sm:6px;
  --font:'Inter','PingFang SC','Microsoft YaHei',system-ui,-apple-system,sans-serif
}
html{font-size:15px}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5;-webkit-font-smoothing:antialiased}

/* Header */
.nav{display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:56px;border-bottom:1px solid var(--border);background:var(--bg-surface);position:sticky;top:0;z-index:100}
.nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-brand svg{color:var(--gold);width:22px;height:22px}
.nav-brand span{font-size:16px;font-weight:600;color:var(--text);letter-spacing:-0.3px}
.nav-brand small{font-size:12px;color:var(--text-tertiary);font-weight:400;margin-left:4px}
.nav-actions{display:flex;align-items:center;gap:8px}
.nav-divider{width:1px;height:20px;background:var(--border);margin:0 8px}
.nav-input{padding:5px 8px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12px;color:var(--text);font-family:var(--font);outline:none}
.nav-input:focus{border-color:var(--gold)}
.nav-input::placeholder{color:var(--text-tertiary)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-weight:500;font-family:var(--font);cursor:pointer;transition:all .15s;background:transparent;color:var(--text-secondary);line-height:1}
.btn:hover{border-color:var(--border-hover);color:var(--text);background:var(--bg-hover)}
.btn:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}
.btn-primary{background:var(--gold);color:#000;border-color:var(--gold);font-weight:600}
.btn-primary:hover{background:var(--gold-hover);border-color:var(--gold-hover)}
.btn-ghost{border-color:transparent;color:var(--text-secondary)}
.btn-ghost:hover{background:var(--bg-hover);color:var(--text);border-color:transparent}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-icon{padding:7px;min-width:32px;justify-content:center}

/* Layout */
.layout{display:grid;grid-template-columns:420px 1fr;height:calc(100vh - 56px)}
@media(max-width:1024px){.layout{grid-template-columns:1fr;height:auto}}

/* Left Panel */
.panel-left{border-right:1px solid var(--border);overflow:hidden;display:flex;flex-direction:column;background:var(--bg-surface)}
.panel-left-header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border);flex-shrink:0}
.panel-left-header h2{font-size:13px;font-weight:600;color:var(--text);text-transform:uppercase;letter-spacing:0.5px;display:flex;align-items:center;gap:8px}
.panel-left-header h2 svg{width:14px;height:14px;color:var(--gold)}
.panel-left-header .count{font-size:11px;color:var(--text-tertiary);background:var(--bg-card);padding:2px 10px;border-radius:20px;border:1px solid var(--border)}
.question-list{flex:1;overflow-y:auto;padding:12px 16px 24px}
.question-list::-webkit-scrollbar{width:5px}
.question-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* Section header */
.section-hdr{padding:10px 12px;margin:12px 0 8px;border-radius:var(--radius-sm);display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.3px}
.section-hdr.single{background:rgba(59,130,246,0.08);color:#60a5fa}
.section-hdr.multi{background:rgba(239,68,68,0.08);color:#f87171}
.section-hdr.essay{background:rgba(34,197,94,0.08);color:#4ade80}
.section-hdr .scount{font-weight:400;opacity:.6}
.section-hdr svg{width:12px;height:12px;margin-right:6px}

/* Question items */
.qitem{display:block;width:100%;text-align:left;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px;cursor:pointer;transition:all .12s;background:var(--bg-card);font-family:var(--font);color:var(--text)}
.qitem:hover{border-color:var(--border-hover);background:var(--bg-hover)}
.qitem.active{border-color:var(--gold);background:var(--gold-dim);box-shadow:inset 0 0 0 1px var(--gold)}
.qitem-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.qitem-num{font-size:11px;font-weight:600;color:var(--text-tertiary)}
.qitem-badge{font-size:10px;font-weight:600;padding:1px 8px;border-radius:12px;text-transform:uppercase;letter-spacing:0.3px}
.badge-single{background:rgba(59,130,246,0.12);color:#60a5fa}
.badge-multi{background:rgba(239,68,68,0.12);color:#f87171}
.badge-essay{background:rgba(34,197,94,0.12);color:#4ade80}
.qitem-text{font-size:12.5px;color:var(--text-secondary);line-height:1.6;display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical;overflow:hidden}
.qitem-options{font-size:11px;color:var(--text-tertiary);margin-top:4px;line-height:1.5}

/* Right Panel */
.panel-right{overflow-y:auto;background:var(--bg);padding:24px 32px 40px}
.panel-right::-webkit-scrollbar{width:5px}
.panel-right::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* Answer section */
.ans-section{margin-bottom:20px}
.ans-section-title{font-size:12px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.ans-section-title svg{width:13px;height:13px}
.ans-card{margin-bottom:10px;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border);background:var(--bg-card)}
.ans-card:hover{border-color:var(--border-hover)}
.ans-q{padding:8px 14px;background:var(--bg);border-bottom:1px solid var(--border)}
.ans-q-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-tertiary);margin-bottom:3px;display:flex;align-items:center;gap:4px}
.ans-q-text{font-size:13px;line-height:1.5;color:var(--text);font-weight:450}
.ans-q-options{font-size:11px;color:var(--text-tertiary);margin-top:4px;line-height:1.6}
.ans-a{padding:8px 14px 10px;background:var(--bg-card)}
.ans-a-label{font-size:10px;font-weight:600;color:var(--gold);margin-bottom:4px;display:flex;align-items:center;gap:4px}
.ans-a-row{display:flex;gap:8px;align-items:center}
.ans-input{flex:1;padding:8px 12px;background:var(--bg);border:1px dashed var(--border);border-radius:var(--radius-sm);font-size:13px;color:var(--text);font-family:var(--font);transition:all .15s;outline:none;letter-spacing:.5px}
.ans-input:focus{border-color:var(--gold);border-style:solid;background:var(--bg-card)}
.ans-textarea{min-height:70px;resize:vertical;line-height:1.6}
.ans-input::placeholder{color:var(--text-tertiary)}
.ans-textarea{min-height:72px;resize:vertical;line-height:1.5}
.ans-options{font-size:11px;color:var(--text-tertiary);margin-bottom:6px;line-height:1.5}

/* Action bar */
.action-bar{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;padding-top:16px;border-top:1px solid var(--border)}

/* Loading */
.loading-overlay{display:none;text-align:center;padding:60px 20px}
.loading-overlay.active{display:block}
.loading-spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:14px;color:var(--text-secondary)}
.loading-sub{font-size:12px;color:var(--text-tertiary);margin-top:6px}

/* Results */
.result-area{display:none;margin-top:24px}
.result-area.visible{display:block}
.score-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:24px}
.score-card{padding:16px;border-radius:var(--radius-sm);border:1px solid var(--border);text-align:center;background:var(--bg-card)}
.score-card.total{background:var(--gold-dim);border-color:rgba(201,169,98,0.2)}
.score-card-value{font-size:28px;font-weight:700;letter-spacing:-1px;font-variant-numeric:tabular-nums}
.score-card-label{font-size:11px;color:var(--text-secondary);margin-top:2px}
.score-card .pass-badge{display:inline-block;margin-top:8px;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:600}
.title-divider{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;margin:20px 0 12px;color:var(--text)}
.title-divider svg{width:14px;height:14px;color:var(--gold)}
.title-divider-line{flex:1;height:1px;background:var(--border)}

/* Result items */
.res-item{padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px;background:var(--bg-card)}
.res-item.correct{border-color:rgba(34,197,94,0.3)}
.res-item.wrong{border-color:rgba(239,68,68,0.3)}
.res-item.partial{border-color:rgba(234,179,8,0.3)}
.res-item-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.res-item-text{font-size:12.5px;color:var(--text-secondary)}
.res-item-score{font-size:13px;font-weight:600}
.res-item-answer{font-size:11px;color:var(--text-tertiary);margin-top:3px}
.res-item-feedback{font-size:11px;color:var(--text-tertiary);margin-top:6px;line-height:1.5}

/* Strengths/Weaknesses */
.sw-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:16px 0}
.sw-box{padding:14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-card)}
.sw-box-title{font-size:11px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.tags{display:flex;flex-wrap:wrap;gap:4px}
.tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:500}
.tag-good{background:var(--success-bg);color:var(--success);border:1px solid rgba(34,197,94,0.2)}
.tag-bad{background:var(--danger-bg);color:var(--danger);border:1px solid rgba(239,68,68,0.2)}
.feedback-box{padding:14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-card);font-size:13px;line-height:1.6;color:var(--text-secondary)}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;justify-content:center;align-items:center;backdrop-filter:blur(4px)}
.modal-overlay.active{display:flex}
.modal{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:28px;width:460px;max-width:92vw;box-shadow:0 24px 80px rgba(0,0,0,0.5)}
.modal h2{font-size:16px;font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.modal h2 svg{width:16px;height:16px;color:var(--gold)}
.modal-desc{font-size:12px;color:var(--text-tertiary);margin-bottom:20px}
.form-group{margin-bottom:14px}
.form-group label{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:var(--text-secondary);margin-bottom:4px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--text-tertiary);display:inline-block}
.dot.on{background:var(--success)}
.form-group input{width:100%;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;color:var(--text);font-family:var(--font);outline:none;transition:border-color .12s}
.form-group input:focus{border-color:var(--gold)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}

/* Empty state */
.empty-state{padding:80px 20px;text-align:center;color:var(--text-tertiary)}
.empty-state svg{width:40px;height:40px;margin-bottom:12px;color:var(--text-tertiary)}
.empty-state p{font-size:13px}

/* Tabs */
.tabs{display:flex;gap:0;margin-bottom:16px;border-bottom:1px solid var(--border)}
.tab-btn{padding:8px 20px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--text-tertiary);border-bottom:2px solid transparent;transition:all .12s;font-family:var(--font);display:flex;align-items:center;gap:6px}
.tab-btn:hover{color:var(--text);background:var(--bg)}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold);background:transparent}
.tab-btn svg{width:13px;height:13px}
.tab-content{display:none}
.tab-content.active{display:block}

/* Wrong answers */
.wrong-item{padding:12px 16px;border:1px solid rgba(239,68,68,0.25);border-radius:var(--radius-sm);margin-bottom:10px;background:var(--bg-card)}
.wrong-item-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.wrong-q{font-size:13px;font-weight:500;color:var(--text)}
.wrong-answer{font-size:12px;margin-top:4px}
.wrong-yours{color:var(--danger)}
.wrong-correct{color:var(--success)}
.wrong-explanation{padding:8px 12px;background:var(--bg);border-radius:6px;margin-top:8px;font-size:12px;line-height:1.6;color:var(--text-secondary)}

/* Knowledge base */
.kb-category{margin-bottom:20px}
.kb-category-title{font-size:14px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.kb-category-title svg{width:16px;height:16px;color:var(--gold)}
.kb-card{padding:12px 16px;border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px;background:var(--bg-card)}
.kb-card-title{font-size:13px;font-weight:600;margin-bottom:4px;color:var(--text)}
.kb-card-desc{font-size:12px;color:var(--text-secondary);line-height:1.6}
.kb-tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:500;margin:2px;background:rgba(201,169,98,0.1);color:var(--gold);border:1px solid rgba(201,169,98,0.2)}
.kb-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:700px){.kb-grid{grid-template-columns:1fr}}

/* Clickable choices */
.choice-item{display:inline-flex;align-items:flex-start;gap:4px;padding:6px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12px;cursor:pointer;transition:all .12s;background:var(--bg-card);line-height:1.4;position:relative}
.choice-item:hover{border-color:var(--gold)}
.choice-item.selected{background:var(--gold-dim);border-color:var(--gold);font-weight:500}
.choice-single.selected{box-shadow:0 0 0 1px var(--gold)}
.choice-multi.selected{box-shadow:0 0 0 1px var(--gold)}
.choice-item::before{content:'';width:12px;height:12px;min-width:12px;border:1.5px solid var(--border);border-radius:50%;display:inline-block;margin-top:2px;transition:all .12s}
.choice-multi::before{border-radius:2px}
.choice-item.selected::before{background:var(--gold);border-color:var(--gold)}
.choice-single.selected::before{box-shadow:inset 0 0 0 2.5px var(--bg-card)}

/* Status bar */
.status-bar{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text-tertiary)}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--success)}
</style>
</head>
<body>

<!-- Nav -->
<nav class="nav">
  <a class="nav-brand" href="#">
    <i data-lucide="book-open" style="width:20px;height:20px"></i>
    <span>ITO <small>· AI 评分</small></span>
  </a>
  <div class="nav-actions">
    <div class="status-bar">
      <span class="status-dot"></span>
      <span id="loadStatus">载入中</span>
    </div>
    <div class="nav-divider"></div>
    <input type="text" id="feishuName" placeholder="主播姓名" class="nav-input" style="width:80px" title="主播姓名（必填，用于飞书记录）">
    <input type="text" id="feishuDept" placeholder="部门" class="nav-input" style="width:72px" title="所属部门">
    <div class="nav-divider"></div>
    <select id="examTypeSelect" style="padding:5px 8px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12px;color:var(--text);font-family:var(--font);outline:none;cursor:pointer;margin-right:4px">
      <option value="random">随机抽题</option>
      <option value="fixed">新品考试0616</option>
    </select>
    <select id="modelSelect" style="padding:5px 8px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12px;color:var(--text);font-family:var(--font);outline:none;cursor:pointer">
      <option value="deepseek">DeepSeek</option>
      <option value="gemini">Gemini</option>
      <option value="kimi">Kimi</option>
      <option value="chatanywhere">ChatAnywhere</option>
    </select>
    <button class="btn btn-ghost btn-sm btn-icon" onclick="openConfig()" title="API Key">
      <i data-lucide="key-round" style="width:14px;height:14px"></i>
    </button>
  </div>
</nav>

<!-- Layout -->
<div class="layout">
  <!-- Left Panel -->
  <div class="panel-left">
    <div class="panel-left-header">
      <h2><i data-lucide="clipboard-list"></i> 考试题目</h2>
      <span class="count" id="questionCount">载入中</span>
    </div>
    <div class="question-list" id="questionList">
      <div class="empty-state"><i data-lucide="loader"></i><p>加载中...</p></div>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="panel-right">
    <div class="ans-section">
      <div class="ans-section-title"><i data-lucide="pen-square"></i> 答题区</div>
      <div id="answerInputs"></div>
      <p style="font-size:11px;color:var(--text-tertiary);margin-top:8px;display:flex;align-items:center;gap:6px">
        <i data-lucide="info" style="width:12px;height:12px"></i>
        客观题填入答案字母，简答题粘贴主播完整回答
      </p>
    </div>

    <div class="action-bar">
      <button class="btn btn-primary" onclick="startGrading()" id="gradeBtn">
        <i data-lucide="brain" style="width:14px;height:14px"></i> AI 评分
      </button>
      <button class="btn" onclick="fillSample()" id="sampleBtn" style="display:none">
        <i data-lucide="file-edit" style="width:14px;height:14px"></i> 样例
      </button>
      <button class="btn" onclick="clearAll()">
        <i data-lucide="trash-2" style="width:14px;height:14px"></i> 清空
      </button>
    </div>

    <!-- Loading -->
    <div class="loading-overlay" id="loadingIndicator">
      <div class="loading-spinner"></div>
      <div class="loading-text">AI 正在评分...</div>
      <div class="loading-sub">客观题自动对错 + 主观题 NLP 智能评分</div>
    </div>

    <!-- Results -->
    <div class="result-area" id="resultArea">
      <div class="tabs" id="resultTabs">
        <button class="tab-btn active" data-tab="score" onclick="switchTab('score')"><i data-lucide="clipboard-list"></i>评分结果</button>
        <button class="tab-btn" data-tab="wrong" onclick="switchTab('wrong')"><i data-lucide="x-circle"></i>错题库<span id="wrongCount" style="margin-left:4px;font-size:10px;color:var(--danger)"></span></button>
        <button class="tab-btn" data-tab="knowledge" onclick="switchTab('knowledge')"><i data-lucide="book-open"></i>产品知识库</button>
      </div>

      <div class="tab-content active" id="tabScore">
        <div class="score-grid" id="scoreSummary"></div>
        <div id="resultDetails"></div>
        <div id="swSection" style="display:none">
          <div class="title-divider"><i data-lucide="clipboard-check"></i> 综合评估<span class="title-divider-line"></span></div>
          <div class="sw-grid">
            <div class="sw-box"><div class="sw-box-title" style="color:var(--success)"><i data-lucide="sparkles" style="width:13px;height:13px"></i> 优势</div><div class="tags" id="strengthsTags"></div></div>
            <div class="sw-box"><div class="sw-box-title" style="color:var(--danger)"><i data-lucide="target" style="width:13px;height:13px"></i> 待改进</div><div class="tags" id="weaknessesTags"></div></div>
          </div>
          <div class="title-divider" style="margin-top:0"><i data-lucide="lightbulb"></i> 评语<span class="title-divider-line"></span></div>
          <div class="feedback-box" id="overallFeedback"></div>
        </div>
      </div>

// Toast 提示
function showToast(msg) {
  var t = document.getElementById('toastEl');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toastEl';
    t.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;padding:10px 24px;border-radius:10px;font-size:13px;z-index:9999;opacity:0;transition:opacity .3s;box-shadow:0 8px 32px rgba(0,0,0,0.2)';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(function(){ t.style.opacity = '0'; }, 3000);
}

function loadExam(type) {
  EXAM_DATA = type === 'fixed' ? EXAM_FIXED : buildExam();
  renderQuestions();
  renderAnswerInputs();
  var t = ''; EXAM_DATA.sections.forEach(function(s,i){t+=s.count+s.type+(i<3?' · ':'')});
  document.getElementById('loadStatus').textContent = t+' · 100 分 · 80 分及格';
  document.getElementById('questionCount').textContent = t;
  document.getElementById('sampleBtn').style.display = 'none';
  lucide.createIcons();
}

function init() {
  document.getElementById('examTypeSelect').addEventListener('change', function(){loadExam(this.value)});
  loadExam(localStorage.getItem('examType')||'random');
  // 恢复主播信息
  ['feishuName','feishuDept'].forEach(function(id){
    var saved = localStorage.getItem(id);
    if (saved) document.getElementById(id).value = saved;
  });
  // 自动保存主播信息
  document.getElementById('feishuName').addEventListener('input', function(){
    if (this.value.trim()) localStorage.setItem('feishuName', this.value);
  });
  document.getElementById('feishuDept').addEventListener('input', function(){
    if (this.value.trim()) localStorage.setItem('feishuDept', this.value);
  });
  // 内置 DeepSeek API Key（仅第一次注入，用户可覆盖）
  if (!localStorage.getItem('ai_key_deepseek')) {
    localStorage.setItem('ai_key_deepseek', 'sk-738f6fd966504bb98a6dc4ab27510045');
  }
  // 从URL参数读取API Key（支持 ?key=xxx 或 ?api_key=xxx 或 ?model=deepseek）
  var params = new URLSearchParams(location.search);
  var keyFromUrl = params.get('key') || params.get('api_key') || '';
  var modelFromUrl = params.get('model') || '';
  if (keyFromUrl) {
    // 自动选择模型并保存Key
    var m = modelFromUrl || 'deepseek';
    localStorage.setItem('ai_key_'+m, keyFromUrl);

function renderQuestions() {
  var c = document.getElementById('questionList');
  var h = '';
  EXAM_DATA.sections.forEach(function(s) {
    var cls = s.type === '单选' ? 'single' : s.type === '多选' ? 'multi' : s.type === '填空' ? 'multi' : 'essay';
    h += '<div class="section-hdr '+cls+'"><span><i data-lucide="list"></i>'+s.title+'</span><span class="scount">'+s.count+'题 · '+(s.totalScore||(s.count*s.scorePerQuestion||s.count*s.scorePerFill))+'分</span></div>';
    s.questions.forEach(function(q, i) {
      var badge = s.type === '单选' ? 'badge-single' : s.type === '多选' ? 'badge-multi' : 'badge-essay';
      h += '<div class="qitem" id="qitem-'+q.id+'" onclick="focusQuestion(\''+q.id+'\')">'+
        '<div class="qitem-top"><span class="qitem-num">Q'+(i+1)+'</span><span class="qitem-badge '+badge+'">'+s.type+'</span></div>'+
        '<div class="qitem-text">'+q.text+'</div>'+
        (q.options ? '<div class="qitem-options">'+q.options.join(' · ')+'</div>' : '')+'</div>';
    });
  });
  c.innerHTML = h;
  lucide.createIcons();
}

function renderAnswerInputs() {
  var c = document.getElementById('answerInputs');
  var h = '<div id="clickableArea">';
  EXAM_DATA.sections.forEach(function(s) {
    var icon = s.type === '简答' ? 'message-square' : s.type === '填空' ? 'list-checks' : 'check-square';
    h += '<div class="ans-section-title" style="margin-top:16px"><i data-lucide="'+icon+'"></i>'+s.title+'</div>';
    s.questions.forEach(function(q, i) {
      h += '<div class="ans-card">';
      h += '<div class="ans-q">';
      h += '<div class="ans-q-label"><i data-lucide="help-circle" style="width:10px;height:10px"></i>Q'+(i+1)+' · '+s.type+'</div>';
      h += '<div class="ans-q-text">'+q.text+'</div>';
      h += '</div><div class="ans-a">';
      if (s.type === '简答') {
        h += '<div class="ans-a-label"><i data-lucide="pen-line" style="width:10px;height:10px"></i>作答</div>';
        h += '<textarea id="ans-'+q.id+'" class="ans-input ans-textarea" placeholder="粘贴主播回答..."></textarea>';
      } else if (s.type === '填空') {
        h += '<div class="ans-a-label"><i data-lucide="pen-line" style="width:10px;height:10px"></i>填入答案</div>';
        h += '<input id="ans-'+q.id+'" class="ans-input" placeholder="填空回答..." style="flex:1" autocomplete="off">';
      } else {
        var isMulti = s.type === '多选';
        h += '<div class="ans-a-label"><i data-lucide="mouse-pointer-click" style="width:10px;height:10px"></i>'+(isMulti?'勾选所有正确选项（多选）':'点选唯一答案（单选）')+'</div>';
        h += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px">';
        q.options.forEach(function(opt, oi){
          var letter = String.fromCharCode(65+oi);
          var typeClass = isMulti ? 'choice-multi' : 'choice-single';
          h += '<div class="choice-item '+typeClass+'" data-q="'+q.id+'" data-val="'+letter+'" onclick="toggleChoice(this)">'+letter+'. '+opt.replace(/^[A-Z]\.\s*/,'')+'</div>';
        });
        h += '</div>';
        h += '<input type="hidden" id="ans-'+q.id+'" value="">';
        if (isMulti) h += '<div style="font-size:10px;color:var(--text-tertiary);display:flex;justify-content:space-between"><span id="sel-'+q.id+'">已选: </span><span onclick="clearMulti(\''+q.id+'\')" style="cursor:pointer;color:var(--danger)">清空</span></div>';
      }
      h += '</div></div>';
    });
  });
  h += '</div>';
  c.innerHTML = h;
  lucide.createIcons();
}

function toggleChoice(el) {
  var qid = el.getAttribute('data-q');
  var val = el.getAttribute('data-val');
  var isMulti = el.classList.contains('choice-multi');
  if (isMulti) {
    el.classList.toggle('selected');
    var sel = [];
    document.querySelectorAll('.choice-multi.selected[data-q="'+qid+'"]').forEach(function(e){sel.push(e.getAttribute('data-val'))});
    document.getElementById('ans-'+qid).value = sel.join('');
    document.getElementById('sel-'+qid).textContent = '已选: '+sel.join(', ');
  } else {
    document.querySelectorAll('.choice-item[data-q="'+qid+'"]').forEach(function(e){e.classList.remove('selected')});
    el.classList.add('selected');
    document.getElementById('ans-'+qid).value = val;
  }
}

function clearMulti(id) {
  document.querySelectorAll('.choice-multi[data-q="'+id+'"]').forEach(function(e){e.classList.remove('selected')});
  document.getElementById('ans-'+id).value = '';
  document.getElementById('sel-'+id).textContent = '已选: ';
}

function focusQuestion(id) {
  document.querySelectorAll('.qitem').forEach(function(el){el.classList.remove('active')});
  var item = document.getElementById('qitem-'+id);
  if (item) { item.classList.add('active'); item.scrollIntoView({behavior:'smooth',block:'center'}); }
  var input = document.getElementById('ans-'+id);
  if (input) { input.focus(); input.scrollIntoView({behavior:'smooth',block:'center'}); }
}

function collectAnswers() {
  var a = [];
  var miss = 0;
  EXAM_DATA.sections.forEach(function(s){s.questions.forEach(function(q){
    var v = (document.getElementById('ans-'+q.id)?.value||'').trim();
    if (!v && s.type !== '简答') miss++;
    a.push({id:q.id, text:q.text.length>80?q.text.substring(0,80)+'...':q.text, type:s.type==='简答'?'subjective':'objective', answer:v||'未作答'});
  })});
  if (miss > 0 && !confirm('有 '+miss+' 道客观题未作答，确定继续？')) return null;
  return a;
}

function buildPrompt(answers) {
  var s0 = EXAM_DATA.sections[0], s1 = EXAM_DATA.sections[1], s2 = EXAM_DATA.sections[2], s3 = EXAM_DATA.sections[3];
  var p = '# ITO 2026 考试评分\n\n## 评分规则\n### 客观题\n- 单选每题' + s0.scorePerQuestion + '分共' + s0.count + '题' + s0.totalScore + '分\n- 多选每题' + s1.scorePerQuestion + '分共' + s1.count + '题' + s1.totalScore + '分（多/少/错选不得分）\n- 填空每题' + (s2.scorePerFill||1) + '分共' + s2.count + '题' + s2.totalScore + '分\n- 直接比对答案\n\n### 简答题\n- 每题' + s3.scorePerQuestion + '分共' + s3.count + '题' + s3.totalScore + '分\n- 采分点制，看核心信息覆盖\n\n## 标准答案\n\n';
  p += '### 单选题\n'; EXAM_DATA.sections[0].questions.forEach(function(q){p+=q.id+': '+q.answer+'\n'});
  p += '\n### 多选题\n'; EXAM_DATA.sections[1].questions.forEach(function(q){p+=q.id+': '+q.answer+'\n'});
  p += '\n### 填空题\n'; EXAM_DATA.sections[2].questions.forEach(function(q){p+=q.id+': '+q.blankAnswer+'\n'});
  p += '\n### 简答采分点\n'; EXAM_DATA.sections[3].questions.forEach(function(q){p+=q.id+'（'+q.maxScore+'分）: '; q.scoringPoints.forEach(function(sp){p+='['+sp.score+'分]'+sp.point+'; '}); p+='\n'});
  p += '\n---\n## 学员答案\n'; answers.forEach(function(sa){p+=sa.id+': '+sa.answer+'\n'});
  var sc1 = EXAM_DATA.sections[0].questions[0].id; var mc1 = EXAM_DATA.sections[1].questions[0].id; var fb1 = EXAM_DATA.sections[2].questions[0].id; var es1 = EXAM_DATA.sections[3].questions[0].id;
  p += '\n---\n## 输出JSON格式（不要其他文字）\n{\n  "scores":{\n    "singleChoice":{"total":' + s0.totalScore + ',"earned":0,"details":{"'+sc1+'":""}},\n    "multipleChoice":{"total":' + s1.totalScore + ',"earned":0,"details":{"'+mc1+'":""}},\n    "fillBlank":{"total":' + s2.totalScore + ',"earned":0,"details":{"'+fb1+'":""}},\n    "essay":{"total":' + s3.totalScore + ',"earned":0,"details":{"'+es1+'":{"score":0,"feedback":"评语","missedPoints":[]}}}\n  },\n  "summary":{"totalEarned":0,"passed":false,"strengths":[],"weaknesses":[],"overallFeedback":""}\n}';
  return p;
}

async function callAI(provider, prompt) {
  var key = localStorage.getItem('ai_key_'+provider);
  if (!key) throw new Error('请先配置 '+provider+' 的 API Key');
  var ep = AI_ENDPOINTS[provider];
  if (provider === 'gemini') {
    var r = await fetch(ep.urlBase+'?key='+encodeURIComponent(key), {method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.3,maxOutputTokens:8192}})});
    var d = await r.json();
    if (!r.ok) throw new Error('Gemini '+(d.error?.message||r.status));
    return d.candidates?.[0]?.content?.parts?.[0]?.text || '';
  }
  var r = await fetch(ep.url, {method:'POST',headers:{'Authorization':'Bearer '+key,'Content-Type':'application/json'},
    body:JSON.stringify({model:ep.model,messages:[{role:'system',content:'你是严格评分专家。只输出JSON。'},{role:'user',content:prompt}],temperature:0.3,max_tokens:8192})});
  var d = await r.json();
  if (!r.ok) throw new Error('AI '+r.status+': '+(d.error?.message||JSON.stringify(d).substring(0,200)));
  return d.choices?.[0]?.message?.content || '';
}

async function startGrading() {
  var a = collectAnswers(); if (!a) return;
  var p = document.getElementById('modelSelect').value;
  var btn = document.getElementById('gradeBtn');
  var ld = document.getElementById('loadingIndicator');
  var ra = document.getElementById('resultArea');
  btn.disabled = true; btn.innerHTML = '<i data-lucide="loader" style="width:14px;height:14px"></i> 评分中'; lucide.createIcons();
  ld.classList.add('active'); ra.classList.remove('visible');
  try {
    var prompt = buildPrompt(a);
    var t = await callAI(p, prompt);
    var clean = t.replace(/```[a-z]*\s*/gi,'').replace(/```\s*/g,'').trim();
    var idx = clean.indexOf('{'); if(idx===-1) throw new Error('AI未返回JSON');
    clean = clean.substring(idx); var end = clean.lastIndexOf('}'); if(end===-1) throw new Error('JSON不完整');
    clean = clean.substring(0,end+1).replace(/,\s*}/g,'}').replace(/,\s*\]/g,']');
    var result = JSON.parse(clean);
    displayResults(result, a);
  } catch(e) {
    ra.classList.add('visible');
    document.getElementById('scoreSummary').innerHTML = '<div class="score-card" style="grid-column:span 4;padding:32px;color:var(--danger)"><i data-lucide="alert-circle" style="width:32px;height:32px;margin-bottom:8px"></i><div style="font-size:14px">'+e.message+'</div></div>';
    lucide.createIcons();
  } finally {
    btn.disabled = false; btn.innerHTML = '<i data-lucide="brain" style="width:14px;height:14px"></i> AI 评分';ld.classList.remove('active');
    lucide.createIcons();
  }
}

function renderWrongAnswers() {
  var c = document.getElementById('wrongList');
  if (!WRONG_ANSWERS.length) { c.innerHTML = '<div class="empty-state" style="padding:40px"><i data-lucide="check-circle-2" style="width:32px;height:32px;color:var(--success)"></i><p style="margin-top:8px">全部答对，没有错题 🎉</p></div>'; lucide.createIcons(); return; }
  var h = '<p style="font-size:12px;color:var(--text-tertiary);margin-bottom:12px">共 <b style="color:var(--danger)">'+WRONG_ANSWERS.length+'</b> 道错题，建议逐一复习</p>';
  WRONG_ANSWERS.forEach(function(w, i) {
    h += '<div class="wrong-item"><div class="wrong-item-hdr"><span class="wrong-q">'+(i+1)+'. '+w.text+'</span><span style="font-size:11px;font-weight:600;color:var(--danger)">✕ 答错</span></div>';
    h += '<div class="wrong-answer"><span class="wrong-yours">你的答案：<b>'+(w.yourAnswer||'未作答')+'</b></span></div>';
    h += '<div class="wrong-answer"><span class="wrong-correct">正确答案：<b>'+(w.correctAnswer||'')+'</b></span></div>';
    if (w.explanation) h += '<div class="wrong-explanation">💡 <b>知识点：</b>'+w.explanation+'</div>';
    h += '</div>';
  });
  c.innerHTML = h;
  lucide.createIcons();
}

function renderKnowledgeBase() {
  var c = document.getElementById('knowledgeBase');
  if (c.innerHTML.trim()) return; // 只渲染一次
  var h = '';
  KB_DATA.forEach(function(cat) {
    h += '<div class="kb-category"><div class="kb-category-title"><i data-lucide="'+cat.icon+'"></i>'+cat.name+'</div>';
    cat.items.forEach(function(item) {
      h += '<div class="kb-card"><div class="kb-card-title">'+item.title+'</div><div class="kb-card-desc">'+item.desc+'</div>'+

    });
    h += '</div>';
  });
  c.innerHTML = h;
  lucide.createIcons();
}

function displayResults(data, answers) {
  var ra = document.getElementById('resultArea'); ra.classList.add('visible');
  WRONG_ANSWERS = []; // 重置错题库
  var s = data.scores;
  if (!s) { document.getElementById('scoreSummary').innerHTML = '<div class="score-card" style="grid-column:span 4;padding:32px;color:var(--warning)">AI返回异常</div>'; return; }
  var sc = s.singleChoice?.earned||0, mc = s.multipleChoice?.earned||0, fb = s.fillBlank?.earned||0;
  var objT = sc+mc+fb;
  var subT = (s.essay?.earned||0);
  var total = objT+subT;
  var passed = total >= 80;

  document.getElementById('scoreSummary').innerHTML =
    '<div class="score-card total"><div class="score-card-value" style="color:var(--gold)">'+total+'/100</div><div class="score-card-label">总分</div><div class="pass-badge" style="background:'+(passed?'var(--success-bg)':'var(--danger-bg)')+';color:'+(passed?'var(--success)':'var(--danger)')+'">'+(passed?'合格':'不合格')+'</div></div>'+
    '<div class="score-card"><div class="score-card-value" style="color:#60a5fa">'+sc+'/27</div><div class="score-card-label">单选</div></div>'+
    '<div class="score-card"><div class="score-card-value" style="color:#f87171">'+mc+'/27</div><div class="score-card-label">多选</div></div>'+
    '<div class="score-card"><div class="score-card-value" style="color:#a78bfa">'+fb+'/10</div><div class="score-card-label">填空</div></div>'+
    '<div class="score-card"><div class="score-card-value" style="color:#4ade80">'+subT+'/36</div><div class="score-card-label">简答</div></div>';

  var dh = '<div class="title-divider"><i data-lucide="check-circle"></i> 客观题<span class="title-divider-line"></span></div>';
  var allObjQs = [];
  EXAM_DATA.sections[0].questions.forEach(function(q){allObjQs.push({s:0,q:q,pts:EXAM_DATA.sections[0].scorePerQuestion})});
  EXAM_DATA.sections[1].questions.forEach(function(q){allObjQs.push({s:1,q:q,pts:EXAM_DATA.sections[1].scorePerQuestion})});
  EXAM_DATA.sections[2].questions.forEach(function(q){allObjQs.push({s:2,q:q,pts:1,isFill:true})});
  allObjQs.forEach(function(item){
    var ua = (document.getElementById('ans-'+item.q.id)?.value||'').trim();
    var c = false;
    var correctAns = item.q.answer||item.q.blankAnswer||'';
    if (item.isFill) {
      c = ua.toUpperCase() === (''+correctAns).toUpperCase() || ua === correctAns;
    } else {
      var us = ua.toUpperCase().split('').sort().join('');
      var cs = correctAns.split('').sort().join('');
      c = us === cs && ua.length > 0;
    }
    if (!c) {
      WRONG_ANSWERS.push({text:item.q.text,yourAnswer:ua,correctAnswer:correctAns,explanation:''});
    }
    dh += '<div class="res-item '+(c?'correct':'wrong')+'"><div class="res-item-hdr"><span class="res-item-text"><b>'+item.q.id+'</b> '+(item.q.text.length>50?item.q.text.substring(0,50)+'...':item.q.text)+'</span><span class="res-item-score" style="color:'+(c?'var(--success)':'var(--danger)')+'">'+(c?'+'+item.pts:'+0')+'</span></div><div class="res-item-answer">你的答案: <b>'+(ua||'未作答')+'</b> '+(c?'✓':'✗')+' 标准答案: <b style="color:var(--success)">'+correctAns+'</b></div></div>';
  });

  dh += '<div class="title-divider" style="margin-top:24px"><i data-lucide="message-square"></i> 简答题<span class="title-divider-line"></span></div>';
  EXAM_DATA.sections[3].questions.forEach(function(q,i){
    var d = s.essay?.details?.[q.id]||{score:0,feedback:'AI未评分',missedPoints:[]};
    var es = d.score||0; var ef = d.feedback||'AI未评分'; var em = d.missedPoints||[];
    var r = es/q.maxScore;
    if (r < 0.6) {
      var ua = (document.getElementById('ans-'+q.id)?.value||'未作答').substring(0,100);
      WRONG_ANSWERS.push({text:'简答: '+q.text,yourAnswer:ua,correctAnswer:'参考采分点: '+q.scoringPoints.map(function(sp){return '['+sp.score+'分]'+sp.point}).join('; '),explanation:'得分 '+es+'/'+q.maxScore+'分。AI评语: '+ef+(em.length?' 遗漏: '+em.join(', '):'')});
    }
    dh += '<div class="res-item '+(r>=0.8?'correct':r>=0.5?'partial':'wrong')+'"><div class="res-item-hdr"><span class="res-item-text"><b>简答'+(i+1)+'（'+q.maxScore+'分）</b> '+(q.text.length>60?q.text.substring(0,60)+'...':q.text)+'</span><span class="res-item-score" style="color:'+(r>=0.8?'var(--success)':r>=0.5?'var(--warning)':'var(--danger)')+'">'+es+'/'+q.maxScore+'</span></div><div class="res-item-feedback"><b>AI评语：</b>'+ef+'</div>'+(em.length?'<div class="res-item-feedback" style="color:var(--danger)"><b>遗漏要点：</b>'+em.join('、')+'</div>':'')+'</div>';
  });
  document.getElementById('resultDetails').innerHTML = dh;
  lucide.createIcons();

  if (data.summary) {
    document.getElementById('swSection').style.display = 'block';
    document.getElementById('strengthsTags').innerHTML = (data.summary.strengths||[]).map(function(s){return '<span class="tag tag-good">'+s+'</span>'}).join('');
    document.getElementById('weaknessesTags').innerHTML = (data.summary.weaknesses||[]).map(function(w){return '<span class="tag tag-bad">'+w+'</span>'}).join('');
    document.getElementById('overallFeedback').textContent = data.summary.overallFeedback||'';
    lucide.createIcons();
  }
  ra.scrollIntoView({behavior:'smooth',block:'start'});
  // Auto-submit to Feishu if configured
  // 更新错题计数
  document.getElementById('wrongCount').textContent = WRONG_ANSWERS.length ? '('+WRONG_ANSWERS.length+'题)' : '';
  // 切回评分结果Tab
  switchTab('score');
  submitToFeishu(total, passed, data.summary?.overallFeedback||'');
  document.getElementById('sampleBtn').style.display = 'inline-flex';
}

    '12L日常通勤放14寸笔记本；20L差旅放16寸¥1,390。'];
    for(var i=1;i<=5;i++) document.getElementById('ans-s4q'+i).value = s4[i-1];
  }
}

// ============================================================
//  飞书提交（自动，无需主播配置）
// ============================================================
async function submitToFeishu(totalScore, passed, feedback) {
  var name = document.getElementById('feishuName').value.trim();
  if (!name) { showToast('请先填写主播姓名'); return; }
  var dept = document.getElementById('feishuDept').value.trim();

  try {
    var api = window.location.hostname==='localhost'
      ? 'http://localhost:8768/api/feishu-submit'
      : 'https://ito-ai-grading.vercel.app/api/submit-score';
    var res = await fetch(api, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        name: name,
        department: dept,
        totalScore: totalScore,
        passed: passed,
        feedback: feedback||'',
        duration: 0,
        switches: switchCount
      })
    });
    var d = await res.json();
    if (d.code === 0) { setTimeout(function(){showToast('✅ 已写入飞书表格');},100); }
    else { setTimeout(function(){showToast('⚠ 飞书写入失败：'+(d.msg||'请联系管理员'));},100); }
  } catch(e) {
    setTimeout(function(){showToast('⚠ 飞书同步失败：'+e.message);},100);
  }
}

function openConfig() {
  document.getElementById('configModal').classList.add('active');
  ['deepseek','gemini','kimi','chatanywhere'].forEach(function(p){
    var saved = localStorage.getItem('ai_key_'+p);
    if (saved) { document.getElementById('key-'+p).value = saved; document.getElementById('dot-'+p).className = 'dot on'; }
    else { document.getElementById('dot-'+p).className = 'dot'; }
  });
}
function closeConfig() { document.getElementById('configModal').classList.remove('active'); }
function saveConfig() {
  ['deepseek','gemini','kimi','chatanywhere'].forEach(function(p){
    var v = document.getElementById('key-'+p).value.trim();
    if (v) localStorage.setItem('ai_key_'+p, v);
  });
  showToast('已保存'); closeConfig();
}

// 关闭modal点击外部
document.getElementById('configModal').addEventListener('click', function(e) { if (e.target === this) closeConfig(); });

init();
</script>
