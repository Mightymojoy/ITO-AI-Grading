<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITO 新品考试 AI 智能评分系统</title>
<style>
  :root { --primary: #1a1a2e; --primary-light: #16213e; --accent: #e94560; --accent-light: #ff6b81; --bg: #f5f5f5; --card: #fff; --text: #333; --text-light: #888; --border: #e0e0e0; --success: #27ae60; --warning: #f39c12; --danger: #e74c3c; --radius: 12px; --shadow: 0 2px 12px rgba(0,0,0,0.08); }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  .header { background:linear-gradient(135deg,var(--primary),var(--primary-light)); color:#fff; padding:20px 40px; display:flex; align-items:center; justify-content:space-between; }
  .header h1 { font-size:22px; font-weight:600; }
  .header .subtitle { font-size:13px; opacity:0.8; margin-top:4px; }
  .header-actions { display:flex; gap:10px; align-items:center; }
  .badge { background:rgba(255,255,255,0.15); padding:4px 12px; border-radius:20px; font-size:12px; }
  .container { max-width:1400px; margin:0 auto; padding:20px; display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  .card { background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }
  .card-header { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
  .card-header h2 { font-size:16px; font-weight:600; }
  .card-body { padding:20px; }
  .question-list { max-height:calc(100vh - 180px); overflow-y:auto; }
  .question-item { padding:12px 16px; border:1px solid var(--border); border-radius:8px; margin-bottom:8px; cursor:pointer; transition:all .2s; }
  .question-item:hover { border-color:var(--accent); }
  .question-item.active { border-color:var(--accent); background:#fff5f5; }
  .question-item .q-title { font-size:14px; font-weight:500; margin-bottom:4px; display:flex; justify-content:space-between; }
  .question-item .q-text { font-size:13px; color:var(--text-light); line-height:1.5; }
  .question-item .q-badge { font-size:11px; padding:2px 8px; border-radius:10px; }
  .badge-single { background:#e3f2fd; color:#1565c0; }
  .badge-multi { background:#fce4ec; color:#c62828; }
  .badge-essay { background:#e8f5e9; color:#2e7d32; }
  .section-divider { padding:12px 16px; background:var(--bg); border-radius:8px; margin:12px 0; font-weight:600; font-size:14px; display:flex; justify-content:space-between; }
  .answer-section { margin-bottom:16px; }
  .answer-section label { display:block; font-size:13px; font-weight:500; margin-bottom:6px; color:var(--text-light); }
  .answer-section textarea { width:100%; min-height:80px; padding:12px; border:1px solid var(--border); border-radius:8px; font-size:13px; line-height:1.6; resize:vertical; font-family:inherit; }
  .answer-section textarea:focus { outline:none; border-color:var(--accent); }
  .btn { padding:10px 24px; border:none; border-radius:8px; font-size:14px; font-weight:500; cursor:pointer; transition:all .2s; }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-primary:hover { background:var(--accent-light); transform:translateY(-1px); }
  .btn-primary:disabled { background:#ccc; cursor:not-allowed; transform:none; }
  .btn-outline { background:transparent; border:1px solid var(--border); color:var(--text); }
  .btn-outline:hover { border-color:var(--accent); color:var(--accent); }
  .btn-sm { padding:6px 14px; font-size:12px; }
  .action-bar { display:flex; gap:10px; margin-top:16px; flex-wrap:wrap; }
  .result-section { margin-top:20px; }
  .score-summary { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:20px; }
  .score-card { padding:16px; border-radius:8px; text-align:center; }
  .score-card.total { background:linear-gradient(135deg,var(--primary),var(--primary-light)); color:#fff; }
  .score-card.objective { background:#e8f5e9; color:#2e7d32; }
  .score-card.subjective { background:#fff3e0; color:#e65100; }
  .score-card .score-value { font-size:28px; font-weight:700; }
  .score-card .score-label { font-size:12px; opacity:0.8; margin-top:4px; }
  .result-item { padding:12px 16px; border:1px solid var(--border); border-radius:8px; margin-bottom:8px; }
  .result-item.correct { border-left:4px solid var(--success); }
  .result-item.wrong { border-left:4px solid var(--danger); }
  .result-item.partial { border-left:4px solid var(--warning); }
  .result-item .r-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
  .result-item .r-text { font-size:13px; }
  .result-item .r-feedback { font-size:12px; color:var(--text-light); margin-top:6px; }
  .result-item .r-answer { font-size:12px; color:var(--info); margin-top:4px; }
  .sw-section { margin-top:16px; }
  .sw-section h3 { font-size:14px; margin-bottom:8px; }
  .tag { display:inline-block; padding:4px 12px; border-radius:16px; font-size:12px; margin:3px; }
  .tag-strength { background:#e8f5e9; color:#2e7d32; border:1px solid #a5d6a7; }
  .tag-weakness { background:#ffebee; color:#c62828; border:1px solid #ef9a9a; }
  .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center; }
  .modal-overlay.active { display:flex; }
  .modal { background:#fff; border-radius:var(--radius); padding:30px; width:480px; max-width:90vw; box-shadow:0 20px 60px rgba(0,0,0,0.3); }
  .modal h2 { margin-bottom:20px; font-size:18px; }
  .modal .form-group { margin-bottom:14px; }
  .modal .form-group label { display:block; font-size:13px; font-weight:500; margin-bottom:4px; color:var(--text-light); }
  .modal .form-group input { width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:8px; font-size:13px; }
  .modal .form-group input:focus { outline:none; border-color:var(--accent); }
  .modal .form-group .status-dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; }
  .modal .form-group .status-dot.configured { background:var(--success); }
  .modal .form-group .status-dot.unconfigured { background:#ccc; }
  .modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:20px; }
  .loading { display:none; text-align:center; padding:40px; }
  .loading.active { display:block; }
  .spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 16px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .loading p { color:var(--text-light); font-size:14px; }
  .model-select { padding:8px 12px; border:1px solid var(--border); border-radius:8px; font-size:13px; background:#fff; cursor:pointer; }
  .model-select:focus { outline:none; border-color:var(--accent); }
  .question-list::-webkit-scrollbar { width:6px; }
  .question-list::-webkit-scrollbar-thumb { background:#ddd; border-radius:3px; }
  .question-list::-webkit-scrollbar-track { background:transparent; }
  .empty-state { text-align:center; padding:60px 20px; color:var(--text-light); }
  .empty-state .icon { font-size:48px; margin-bottom:12px; }
  .empty-state p { font-size:14px; }
  @media (max-width:900px) { .container { grid-template-columns:1fr; } .header { padding:16px 20px; flex-direction:column; gap:12px; } .header-actions { width:100%; justify-content:flex-end; } .score-summary { grid-template-columns:1fr; } }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>📚 ITO 新品考试 AI 智能评分系统</h1>
    <div class="subtitle">PISTACHIO PLUS · TRUFFLE PRO · WEEKENDER · 满分100分 · 80分及格</div>
  </div>
  <div class="header-actions">
    <select id="modelSelect" class="model-select">
      <option value="deepseek">DeepSeek</option>
      <option value="gemini">Gemini</option>
      <option value="kimi">Kimi</option>
      <option value="chatanywhere">ChatAnywhere</option>
    </select>
    <button class="btn btn-outline btn-sm" onclick="openConfig()">⚙ API Key</button>
    <span class="badge" id="loadStatus">就绪</span>
  </div>
</div>

<div class="container">
  <div class="card">
    <div class="card-header"><h2>📋 考试题目</h2><span style="font-size:13px;color:var(--text-light)" id="questionCount">20单选·10多选·8简答</span></div>
    <div class="card-body question-list" id="questionList"></div>
  </div>
  <div class="card">
    <div class="card-header"><h2>✍️ 答题与评分</h2><span style="font-size:13px;color:var(--text-light)">填写主播答案</span></div>
    <div class="card-body">
      <div id="answerArea"><div class="answer-section"><div id="answerInputs"></div></div></div>
      <div class="action-bar">
        <button class="btn btn-primary" onclick="startGrading()" id="gradeBtn">🤖 AI 智能评分</button>
        <button class="btn btn-outline" onclick="clearAll()">🗑 清空</button>
        <button class="btn btn-outline" onclick="fillSample()">📄 样例</button>
      </div>
      <div class="loading" id="loadingIndicator">
        <div class="spinner"></div>
        <p>AI 正在评分中，请稍候...</p>
        <p style="font-size:12px;color:var(--text-light);margin-top:8px;">客观题自动对错 + 主观题 NLP 智能评分</p>
      </div>
      <div class="result-section" id="resultArea" style="display:none;">
        <div class="score-summary" id="scoreSummary"></div>
        <div class="card" style="box-shadow:none;border:1px solid var(--border);">
          <div class="card-header"><h2>📊 详细评分</h2><div><span id="passBadge" class="badge"></span></div></div>
          <div class="card-body"><div id="resultDetails"></div></div>
        </div>
        <div class="sw-section" id="swSection" style="display:none;">
          <div class="card" style="box-shadow:none;border:1px solid var(--border);">
            <div class="card-header"><h2>💡 综合评估</h2></div>
            <div class="card-body">
              <div id="strengthsArea" style="margin-bottom:16px;"><h3 style="font-size:14px;margin-bottom:8px;">✅ 优势</h3><div id="strengthsTags"></div></div>
              <div id="weaknessesArea" style="margin-bottom:16px;"><h3 style="font-size:14px;margin-bottom:8px;">⚠️ 待改进</h3><div id="weaknessesTags"></div></div>
              <div id="overallFeedback" style="padding:12px 16px;background:var(--bg);border-radius:8px;font-size:13px;line-height:1.6;"></div>
            </div>
          </div>
        </div>
        <div class="action-bar" style="margin-top:12px;">
          <button class="btn btn-outline btn-sm" onclick="exportResult()">📥 导出评分报告</button>
          <button class="btn btn-outline btn-sm" onclick="document.getElementById('resultArea').style.display='none'">✖ 关闭</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="configModal">
  <div class="modal">
    <h2>⚙ API Key 配置</h2>
    <p style="font-size:13px;color:var(--text-light);margin-bottom:16px;">API Key 保存在浏览器本地，仅用于本机评分</p>
    <div class="form-group"><label><span class="status-dot" id="dot-deepseek"></span>DeepSeek API Key</label><input type="password" id="key-deepseek" placeholder="sk-..."></div>
    <div class="form-group"><label><span class="status-dot" id="dot-gemini"></span>Gemini API Key</label><input type="password" id="key-gemini" placeholder="AIza..."></div>
    <div class="form-group"><label><span class="status-dot" id="dot-kimi"></span>Kimi API Key</label><input type="password" id="key-kimi" placeholder="sk-..."></div>
    <div class="form-group"><label><span class="status-dot" id="dot-chatanywhere"></span>ChatAnywhere API Key</label><input type="password" id="key-chatanywhere" placeholder="sk-..."></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeConfig()">取消</button>
      <button class="btn btn-primary" onclick="saveConfig()">保存</button>
    </div>
  </div>
</div>

const AI_ENDPOINTS = {
  deepseek: { url:'https://api.deepseek.com/v1/chat/completions', model:'deepseek-chat' },
  gemini: { urlBase:'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent' },
  kimi: { url:'https://api.moonshot.cn/v1/chat/completions', model:'moonshot-v1-8k' },
  chatanywhere: { url:'https://api.chatanywhere.tech/v1/chat/completions', model:'gpt-3.5-turbo' }
};

// 初始化
function init() {
  renderQuestions(); renderAnswerInputs();
  document.getElementById('loadStatus').textContent = '已加载 · 100分 · 80分及格';
}

// 左侧题目
function renderQuestions() {
  const c = document.getElementById('questionList'); let h = '';
  EXAM_DATA.sections.forEach(s => {
    const bg = s.type==='单选'?'#e3f2fd':s.type==='多选'?'#fce4ec':'#e8f5e9';
    const cl = s.type==='单选'?'#1565c0':s.type==='多选'?'#c62828':'#2e7d32';
    h += `<div class="section-divider" style="background:${bg};color:${cl}"><span>${s.type==='简答'?'简答题':'选择题'}</span><span>${s.type==='简答'?'共'+s.count+'题 · '+s.totalScore+'分':s.count+'题 · '+s.scorePerQuestion+'分/题 · '+s.totalScore+'分'}</span></div>`;
    s.questions.forEach((q,i) => {
      const bc = s.type==='单选'?'badge-single':s.type==='多选'?'badge-multi':'badge-essay';
      const tl = s.type==='简答'?'简答'+q.maxScore+'分':(s.type==='单选'?'单选':'多选');
      h += `<div class="question-item" id="qitem-${q.id}" onclick="focusQuestion('${q.id}')"><div class="q-title"><span>Q${i+1}</span><span class="q-badge ${bc}">${tl}</span></div><div class="q-text">${q.text}</div>${q.options?'<div style="font-size:12px;color:#666;margin-top:4px;line-height:1.6;">'+q.options.join('<br>')+'</div>':''}</div>`;
    });
  });
  c.innerHTML = h;
}

// 右侧答题区
function renderAnswerInputs() {
  const c = document.getElementById('answerInputs'); let h = '';
  EXAM_DATA.sections.forEach(s => {
    if (s.type === '简答') {
      s.questions.forEach((q,i) => {
        h += `<div style="margin-bottom:12px;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:#fafafa;"><div style="font-size:12px;font-weight:500;color:#2e7d32;margin-bottom:6px;">简答${i+1}（${q.maxScore}分）：${q.text.length>60?q.text.substring(0,60)+'...':q.text}</div><textarea id="ans-${q.id}" placeholder="请输入主播的回答..." style="width:100%;min-height:60px;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:13px;font-family:inherit;line-height:1.6;resize:vertical;"></textarea></div>`;
      });
    } else {
      s.questions.forEach((q,i) => {
        h += `<div style="margin-bottom:10px;padding:8px 12px;border:1px solid var(--border);border-radius:8px;background:#fafafa;"><div style="font-size:12px;font-weight:500;color:${s.type==='单选'?'#1565c0':'#c62828'};margin-bottom:4px;">${s.type==='单选'?'单选':'多选'}${i+1}：${q.text}</div>${q.options?'<div style="font-size:11px;color:#888;margin-bottom:6px;line-height:1.5;">'+q.options.join('&nbsp;&nbsp;')+'</div>':''}<div style="display:flex;align-items:center;gap:10px;"><input type="text" id="ans-${q.id}" placeholder="${s.type==='单选'?'填入字母 A/B/C/D':'填入字母组合 如 ABCDE'}" style="flex:1;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;" maxlength="${s.type==='单选'?'1':'5'}"><span style="font-size:11px;color:#888;min-width:50px;text-align:right;">${q.answer||''}</span></div></div>`;
      });
    }
  });
  c.innerHTML = h;
}

function focusQuestion(id) {
  document.querySelectorAll('.question-item').forEach(el => el.classList.remove('active'));
  const item = document.getElementById('qitem-'+id);
  if (item) { item.classList.add('active'); item.scrollIntoView({behavior:'smooth',block:'center'}); }
  const input = document.getElementById('ans-'+id);
  if (input) { input.focus(); input.scrollIntoView({behavior:'smooth',block:'center'}); }
}

// 收集答案
function collectAnswers() {
  const answers = []; let missing = 0;
  EXAM_DATA.sections.forEach(s => {
    s.questions.forEach(q => {
      const input = document.getElementById('ans-'+q.id);
      const val = input ? input.value.trim() : '';
      if (!val && s.type !== '简答') missing++;
      answers.push({ id:q.id, type:s.type==='简答'?'subjective':'objective', answer:val||(s.type==='简答'?'（未作答）':'未作答') });
    });
  });
  if (missing > 0 && !confirm('有 '+missing+' 道客观题未作答，确定继续？')) return null;
  return answers;
}

// 构建 Prompt
function buildPrompt(answers) {
  let p = `# ITO 新品考试智能评分\n\n## 评分规则\n### 客观题\n- 单选20题×1.5分=30分\n- 多选10题×3分=30分（多选/少选/错选均不得分）\n\n### 主观题\n- 简答8题×5分=40分\n- 采分点制，核心信息覆盖即得分\n\n## 标准答案\n\n### 单选题\n`;
  EXAM_DATA.sections[0].questions.forEach(q => { p += q.id+': '+q.answer+'\n'; });
  p += '\n### 多选题\n';
  EXAM_DATA.sections[1].questions.forEach(q => { p += q.id+': '+q.answer+'\n'; });
  p += '\n### 简答题（采分点）\n';
  EXAM_DATA.sections[2].questions.forEach(q => {
    p += q.id+'（'+q.maxScore+'分）\n';
    q.scoringPoints.forEach(sp => { p += '['+sp.score+'分] '+sp.point+'\n'; });
    p += '\n';
  });
  p += '\n## 学员答案\n';
  answers.forEach(a => { p += a.id+': '+a.answer+'\n'; });
  p += `\n## 请输出JSON格式评分结果（不要任何其他文字）\n{\n  "scores": {\n    "singleChoice": { "total":30, "earned":28.5, "details":{ "s1q1":"C", "s1q2":"D" } },\n    "multipleChoice": { "total":30, "earned":24, "details":{ "s2q1":"ABC", "s2q2":"ABDE" } },\n    "essay": { "total":40, "earned":32, "details":{ "s3q1":{"score":4,"feedback":"评语","missedPoints":["遗漏1"]} } }\n  },\n  "summary": {\n    "totalEarned":84.5,\n    "passed":true,\n    "strengths":["优势1","优势2"],\n    "weaknesses":["不足1","不足2"],\n    "overallFeedback":"总体评语"\n  }\n}`;
  return p;
}

// 调用AI
async function callAI(provider, prompt) {
  const apiKey = localStorage.getItem('ai_key_'+provider);
  if (!apiKey) throw new Error('请先配置 '+provider+' 的 API Key');
  const ep = AI_ENDPOINTS[provider];
  if (provider === 'gemini') {
    const url = ep.urlBase+'?key='+encodeURIComponent(apiKey);
    const res = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ contents:[{ parts:[{ text:prompt }] }], generationConfig:{ temperature:0.3, maxOutputTokens:8192 } }) });
    const data = await res.json();
    if (!res.ok) throw new Error('Gemini '+(data.error?.message||res.status));
    if (data.candidates?.[0]?.finishReason==='SAFETY') throw new Error('Gemini 安全过滤');
    return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
  }
  const res = await fetch(ep.url, { method:'POST', headers:{ 'Authorization':'Bearer '+apiKey, 'Content-Type':'application/json' },
    body:JSON.stringify({ model:ep.model, messages:[{ role:'system', content:'你是严格评分专家。只输出JSON。' }, { role:'user', content:prompt }], temperature:0.3, max_tokens:8192 }) });
  const data = await res.json();
  if (!res.ok) throw new Error('AI '+res.status+': '+(data.error?.message||JSON.stringify(data).substring(0,200)));
  return data.choices?.[0]?.message?.content || '';
}

// 评分主流程
async function startGrading() {
  const answers = collectAnswers(); if (!answers) return;
  const provider = document.getElementById('modelSelect').value;
  const btn = document.getElementById('gradeBtn');
  const loading = document.getElementById('loadingIndicator');
  const ra = document.getElementById('resultArea');
  btn.disabled = true; btn.textContent = '评分中...'; loading.classList.add('active'); ra.style.display = 'none';
  try {
    const prompt = buildPrompt(answers);
    const aiText = await callAI(provider, prompt);
    // 找JSON
    let clean = aiText.replace(/```[a-z]*\s*/gi,'').replace(/```\s*/g,'').trim();
    const brace = clean.indexOf('{');
    if (brace === -1) throw new Error('AI返回无JSON');
    clean = clean.substring(brace);
    const lastBrace = clean.lastIndexOf('}');
    if (lastBrace === -1) throw new Error('JSON格式不完整');
    clean = clean.substring(0, lastBrace+1).replace(/,\s*}/g,'}').replace(/,\s*\]/g,']');
    const result = JSON.parse(clean);
    displayResults(result, answers);
  } catch(e) {
    ra.style.display = 'block';
    document.getElementById('scoreSummary').innerHTML = `<div class="empty-state"><p>❌ ${e.message}</p></div>`;
    document.getElementById('resultDetails').innerHTML = '';
  } finally {
    btn.disabled = false; btn.textContent = '🤖 AI 智能评分'; loading.classList.remove('active');
  }
}

// 显示结果
function displayResults(data, answers) {
  const ra = document.getElementById('resultArea'); ra.style.display = 'block';
  const scores = data.scores;
  if (!scores) { document.getElementById('scoreSummary').innerHTML = '<div class="empty-state"><p>⚠ AI返回异常，请重试</p></div>'; return; }
  const objTotal = (scores.singleChoice?.earned||0) + (scores.multipleChoice?.earned||0);
  const subTotal = scores.essay?.earned||0;
  const total = objTotal + subTotal;
  const passed = total >= 80;
  const badge = document.getElementById('passBadge');
  badge.textContent = passed ? '✅ 合格' : '❌ 不合格';
  badge.style.background = passed ? '#e8f5e9' : '#ffebee';
  badge.style.color = passed ? '#2e7d32' : '#c62828';

  document.getElementById('scoreSummary').innerHTML =
    `<div class="score-card total"><div class="score-value">${total}/100</div><div class="score-label">总分</div><div style="font-size:13px;margin-top:8px;padding:4px 12px;border-radius:16px;display:inline-block;background:${passed?'rgba(255,255,255,0.2)':'rgba(231,76,60,0.3)'}">${passed?'✅ 及格':'❌ 未及格'}</div></div>` +
    `<div class="score-card objective"><div class="score-value">${(scores.singleChoice?.earned||0)}/${(scores.singleChoice?.total||30)}</div><div class="score-label">单选题</div></div>` +
    `<div class="score-card objective"><div class="score-value">${(scores.multipleChoice?.earned||0)}/${(scores.multipleChoice?.total||30)}</div><div class="score-label">多选题</div></div>` +
    `<div class="score-card subjective"><div class="score-value">${subTotal}/${(scores.essay?.total||40)}</div><div class="score-label">简答题</div></div>`;

  let dh = '<h3 style="font-size:14px;margin-bottom:10px;">📝 客观题</h3>';
  EXAM_DATA.sections[0].questions.forEach(q => {
    const userAns = (document.getElementById('ans-'+q.id)?.value||'').trim().toUpperCase();
    const correct = userAns === q.answer;
    dh += `<div class="result-item ${correct?'correct':'wrong'}"><div class="r-header"><span class="r-text"><b>${q.id}</b> ${q.text.length>50?q.text.substring(0,50)+'...':q.text}</span><span style="font-weight:600;font-size:14px;color:${correct?'var(--success)':'var(--danger)'}">${correct?'+1.5':'+0'}</span></div><div class="r-answer">你的答案: <b>${userAns||'未作答'}</b> ${correct?'✅':'❌'} 标准答案: <b style="color:var(--success)">${q.answer}</b></div></div>`;
  });
  EXAM_DATA.sections[1].questions.forEach(q => {
    const userAns = (document.getElementById('ans-'+q.id)?.value||'').trim().toUpperCase();
    const us = userAns.split('').sort().join(''); const cs = q.answer.split('').sort().join('');
    const correct = us === cs && userAns.length > 0;
    dh += `<div class="result-item ${correct?'correct':'wrong'}"><div class="r-header"><span class="r-text"><b>${q.id}</b> ${q.text.length>50?q.text.substring(0,50)+'...':q.text}</span><span style="font-weight:600;font-size:14px;color:${correct?'var(--success)':'var(--danger)'}">${correct?'+3':'+0'}</span></div><div class="r-answer">你的答案: <b>${userAns||'未作答'}</b> ${correct?'✅':'❌'} 标准答案: <b style="color:var(--success)">${q.answer}</b></div></div>`;
  });

  dh += '<h3 style="font-size:14px;margin:20px 0 10px;">💬 简答题</h3>';
  EXAM_DATA.sections[2].questions.forEach((q,i) => {
    const d = scores.essay?.details?.[q.id] || {score:0,feedback:'AI未评分',missedPoints:[]};
    const r = d.score/q.maxScore;
    dh += `<div class="result-item ${r>=0.8?'correct':r>=0.5?'partial':'wrong'}"><div class="r-header"><span class="r-text"><b>简答${i+1}（${q.maxScore}分）</b> ${q.text.length>60?q.text.substring(0,60)+'...':q.text}</span><span style="font-weight:600;font-size:14px;color:${r>=0.8?'var(--success)':r>=0.5?'var(--warning)':'var(--danger)'}">${d.score}/${q.maxScore}</span></div><div class="r-feedback"><b>AI评语：</b>${d.feedback||'无评语'}</div>${d.missedPoints?.length?'<div class="r-feedback" style="color:var(--danger)"><b>遗漏：</b>'+d.missedPoints.join('、')+'</div>':''}</div>`;
  });
  document.getElementById('resultDetails').innerHTML = dh;

  if (data.summary) {
    document.getElementById('swSection').style.display = 'block';
    document.getElementById('strengthsTags').innerHTML = data.summary.strengths?.map(s => '<span class="tag tag-strength">'+s+'</span>').join('') || '';
    document.getElementById('weaknessesTags').innerHTML = data.summary.weaknesses?.map(w => '<span class="tag tag-weakness">'+w+'</span>').join('') || '';
    document.getElementById('overallFeedback').textContent = data.summary.overallFeedback||'';
  }
  ra.scrollIntoView({behavior:'smooth',block:'start'});
}

// 导出
function exportResult() {

  const report = `ITO 新品考试评分报告\n评分时间：${new Date().toLocaleString()}\n模型：${document.getElementById('modelSelect').value}\n总分：${totalEl?.textContent||'N/A'}\n\n--- 详细评分 ---\n${d}\n\n--- 综合评语 ---\n${fb}\n\n--- ITO AI 评分系统 ---`;

}

function openConfig() {
