<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITO · AI 评分</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
:root{--font:'Inter','PingFang SC','Microsoft YaHei',sans-serif;--gold:#c9a962;--gold-dim:rgba(201,169,98,0.08);--bg:#f5f5f0;--bg-card:#fff;--text:#1a1a18;--text-secondary:#4a4a46;--text-tertiary:#9a9a96;--border:#e8e7e2;--border-hover:#d0cfc8;--radius:12px;--radius-sm:8px;--success:#16a34a;--danger:#dc2626;--warning:#d97706;--success-bg:rgba(22,163,74,0.07);--danger-bg:rgba(220,38,38,0.07)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}

/* Nav */
.nav{background:var(--bg-card);border-bottom:1px solid var(--border);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.nav-brand{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--text);font-weight:600;font-size:15px}
.nav-brand svg{width:18px;height:18px;color:var(--gold)}
.nav-right{display:flex;align-items:center;gap:10px}
.nav-divider{width:1px;height:20px;background:var(--border)}
.status-bar{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-tertiary)}
.status-dot{width:5px;height:5px;border-radius:50%;background:var(--success)}
.nav-input{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px 10px;font-size:12px;font-family:var(--font);color:var(--text);outline:none;width:100px;transition:border-color .12s}
.nav-input:focus{border-color:var(--gold)}
.nav-select{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px 6px;font-size:11px;font-family:var(--font);color:var(--text);outline:none;cursor:pointer}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 16px;border:none;border-radius:var(--radius-sm);font-size:12px;font-weight:500;font-family:var(--font);cursor:pointer;transition:all .12s;background:var(--bg);color:var(--text);border:1px solid var(--border)}
.btn:hover{border-color:var(--gold);color:var(--gold)}
.btn-primary{background:var(--gold);color:#000;border-color:var(--gold);font-weight:600}
.btn-primary:hover{opacity:.9}
.btn-ghost{background:transparent;border:1px solid transparent;padding:5px 8px}
.btn-ghost:hover{border-color:var(--border)}
.btn-sm{padding:5px 12px;font-size:11px}
.btn-icon{padding:5px}

/* Main content - single column */
.main{padding:20px 24px 60px;max-width:780px;margin:0 auto}

/* Section headers */
.sec-hdr{font-size:13px;font-weight:600;margin:20px 0 12px;padding-bottom:8px;border-bottom:2px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sec-hdr svg{width:14px;height:14px}
.sec-hdr .sc{font-size:11px;font-weight:400;color:var(--text-tertiary)}
.sec-hdr.single{color:#2563eb}
.sec-hdr.multi{color:#dc2626}
.sec-hdr.fill{color:#7c3aed}
.sec-hdr.essay{color:#16a34a}

/* Question card */
.q-card{border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:10px;background:var(--bg-card);overflow:hidden}
.q-card:hover{border-color:var(--border-hover)}
.q-card-header{padding:10px 14px 8px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.q-card-tag{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;padding:1px 7px;border-radius:4px}
.q-card-tag.single{background:rgba(37,99,235,0.1);color:#2563eb}
.q-card-tag.multi{background:rgba(220,38,38,0.1);color:#dc2626}
.q-card-tag.fill{background:rgba(124,58,237,0.1);color:#7c3aed}
.q-card-tag.essay{background:rgba(22,163,74,0.1);color:#16a34a}
.q-card-text{font-size:14px;line-height:1.6;padding:10px 14px 6px;font-weight:450}
.q-card-options{padding:0 14px 8px;font-size:12px;color:var(--text-tertiary);line-height:1.6}
.q-card-body{padding:6px 14px 12px}

/* Choice buttons */
.choices{display:flex;flex-wrap:wrap;gap:6px}
.choice-item{display:inline-flex;align-items:center;justify-content:center;min-width:32px;height:32px;padding:0 12px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;transition:all .12s;background:var(--bg);color:var(--text-secondary);user-select:none}
.choice-item:hover{border-color:var(--gold);color:var(--gold)}
.choice-item.selected{border-color:var(--gold);background:var(--gold-dim);color:var(--gold);font-weight:600}
.choice-item.multi-sel{border-color:#dc2626;background:rgba(220,38,38,0.06);color:#dc2626;font-weight:600}
.choice-clear{font-size:10px;color:var(--text-tertiary);cursor:pointer;margin-left:8px;text-decoration:underline}
.choice-clear:hover{color:var(--danger)}

/* Fill input */
.fill-row{display:flex;gap:8px;align-items:center}
.fill-input{flex:1;padding:8px 12px;background:var(--bg);border:1px dashed var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:var(--font);color:var(--text);outline:none;transition:all .12s;letter-spacing:.3px}
.fill-input:focus{border-color:var(--gold);border-style:solid;background:var(--bg-card)}

/* Essay input */
.essay-input{width:100%;min-height:80px;padding:10px 12px;background:var(--bg);border:1px dashed var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:var(--font);color:var(--text);line-height:1.6;outline:none;resize:vertical;transition:all .12s}
.essay-input:focus{border-color:var(--gold);border-style:solid;background:var(--bg-card)}

/* Action bar */
.actions{display:flex;gap:8px;margin:20px 0;flex-wrap:wrap;padding-top:16px;border-top:1px solid var(--border)}
.actions-msg{font-size:11px;color:var(--text-tertiary);display:flex;align-items:center;gap:4px;margin-left:auto}

/* Loading */
.loading{display:none;text-align:center;padding:48px 20px}
.loading.active{display:block}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{font-size:13px;color:var(--text-secondary)}

/* Result area */
.result{margin-top:20px;display:none}
.result.visible{display:block}
.r-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:20px}
.r-card{padding:14px;border:1px solid var(--border);border-radius:var(--radius-sm);text-align:center;background:var(--bg-card)}
.r-card.total{background:var(--gold-dim);border-color:rgba(201,169,98,0.25)}
.r-card-val{font-size:24px;font-weight:700;letter-spacing:-.5px}
.r-card-lbl{font-size:10px;color:var(--text-tertiary);margin-top:2px}
.r-pass{display:inline-block;margin-top:6px;padding:1px 10px;border-radius:10px;font-size:10px;font-weight:600}

/* Tabs */
.tabs{display:flex;gap:0;margin-bottom:16px;border-bottom:2px solid var(--border)}
.tab{padding:8px 16px;font-size:12px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--text-tertiary);transition:all .12s;display:flex;align-items:center;gap:6px}
.tab:hover{color:var(--text)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);font-weight:600}
.tab svg{width:13px;height:13px}
.tab-content{display:none}
.tab-content.active{display:block}

/* Result items */
.res-item{padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px;font-size:12px;background:var(--bg-card)}
.res-item.correct{border-left:3px solid var(--success)}
.res-item.wrong{border-left:3px solid var(--danger)}
.res-item.partial{border-left:3px solid var(--warning)}
.res-hdr{display:flex;justify-content:space-between;align-items:center}
.res-feedback{font-size:11px;color:var(--text-tertiary);margin-top:4px}
.res-answer{font-size:11px;color:var(--text-tertiary);margin-top:2px}

/* SW section */
.sw-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:12px 0}
.sw-box{padding:12px;border:1px solid var(--border);border-radius:var(--radius-sm)}
.sw-title{font-size:11px;font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:4px}
.tags{display:flex;flex-wrap:wrap;gap:3px}
.tag{font-size:10px;padding:2px 8px;border-radius:10px}
.tag-good{background:var(--success-bg);color:var(--success)}
.tag-bad{background:var(--danger-bg);color:var(--danger)}
.fb-box{padding:12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12px;line-height:1.6;color:var(--text-secondary)}

/* Knowledge base */
.kb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.kb-card{border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-card);overflow:hidden}
.kb-card-hdr{padding:8px 12px;background:var(--gold-dim);font-size:12px;font-weight:600;color:var(--gold)}
.kb-card-body{padding:8px 12px}
.kb-item{font-size:11px;color:var(--text-secondary);padding:3px 0;border-bottom:1px solid var(--border);line-height:1.5}
.kb-item:last-child{border-bottom:none}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:999;justify-content:center;align-items:center;backdrop-filter:blur(4px)}
.modal-overlay.active{display:flex}
.modal{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:420px;max-width:92vw;box-shadow:0 24px 80px rgba(0,0,0,0.2)}
.modal h2{font-size:15px;font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.modal h2 svg{width:15px;height:15px;color:var(--gold)}
.modal-desc{font-size:11px;color:var(--text-tertiary);margin-bottom:16px}
.form-group{margin-bottom:10px}
.form-group label{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:500;color:var(--text-secondary);margin-bottom:3px}
.dot{width:5px;height:5px;border-radius:50%;background:#ccc;display:inline-block}
.dot.on{background:var(--success)}
.form-group input,.form-group select{width:100%;padding:7px 9px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12px;font-family:var(--font);color:var(--text);outline:none}
.form-group input:focus,.form-group select:focus{border-color:var(--gold)}
.modal-actions{display:flex;gap:6px;justify-content:flex-end;margin-top:14px}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:8px 20px;border-radius:8px;font-size:12px;z-index:9999;opacity:0;transition:opacity .3s;white-space:nowrap}

/* Empty */
.empty{padding:60px 20px;text-align:center;color:var(--text-tertiary);font-size:13px}
.empty svg{width:32px;height:32px;margin-bottom:8px}

@media(max-width:600px){
  .nav{padding:0 12px;height:auto;flex-wrap:wrap;gap:6px;padding:8px 12px}
  .nav-input{width:72px}
  .sw-grid{grid-template-columns:1fr}
  .kb-grid{grid-template-columns:1fr}
  .main{padding:12px 12px 40px}
}
</style>
</head>

function clickSingle(qid,val){
  document.querySelectorAll('#choices-'+qid+' .choice-item').forEach(function(e){e.classList.remove('selected')});
  var el=document.querySelector('#choices-'+qid+' .choice-item[data-val="'+val+'"]');
  if(el){el.classList.add('selected')}
  document.getElementById('ans-'+qid).value = val;
}
function clickMulti(qid,val){
  var el=document.querySelector('#choices-'+qid+' .choice-item[data-val="'+val+'"]');
  if(!el)return;
  el.classList.toggle('multi-sel');
  var vals=[];document.querySelectorAll('#choices-'+qid+' .choice-item.multi-sel').forEach(function(e){vals.push(e.getAttribute('data-val'))});
  document.getElementById('ans-'+qid).value = vals.sort().join('');
}
function clearMulti(qid){
  document.querySelectorAll('#choices-'+qid+' .choice-item').forEach(function(e){e.classList.remove('multi-sel')});
  document.getElementById('ans-'+qid).value = '';
}

function collectAnswers(){var a=[],exam=getExam(),miss=0;exam.sections.forEach(function(s){s.questions.forEach(function(q){var v=(document.getElementById('ans-'+q.id)?.value||'').trim();if(!v&&s.type!=='简答')miss++;a.push({id:q.id,text:q.text.length>80?q.text.substring(0,80)+'…':q.text,type:s.type==='简答'?'subjective':'objective',answer:v||'未作答'})})});if(miss>0&&!confirm('有'+miss+'道客观题未作答，确定继续？'))return null;return a}
function buildPrompt(answers){var p='# ITO考试评分\n\n## 评分规则\n',exam=getExam();exam.sections.forEach(function(s){if(s.type==='单选'){p+='### 单选每题1.2分共'+s.count+'题'+s.totalScore+'分\n';s.questions.forEach(function(q){p+=q.id+':'+q.answer+'\n'})}else if(s.type==='多选'){p+='### 多选每题3分共'+s.count+'题'+s.totalScore+'分\n';s.questions.forEach(function(q){p+=q.id+':'+q.answer+'\n'})}else if(s.type==='填空'){p+='### 填空每题1分共'+s.count+'题'+s.totalScore+'分\n';s.questions.forEach(function(q){p+=q.id+':'+q.blankAnswer+'\n'})}else{p+='### 简答每题'+q.maxScore+'分\n';s.questions.forEach(function(q){p+=q.id+'（'+q.maxScore+'分）:';q.scoringPoints.forEach(function(sp){p+='['+sp.score+'分]'+sp.point+';'});p+='\n'})}});p+='\n## 学员答案\n';answers.forEach(function(sa){p+=sa.id+':'+sa.answer+'\n'});p+='\n## 输出JSON格式\n{"scores":{"singleChoice":{"total":'+exam.sections[0].totalScore+',"earned":0,"details":{}},"multipleChoice":{"total":'+exam.sections[1].totalScore+',"earned":0,"details":{}},"fillBlank":{"total":'+exam.sections[2].totalScore+',"earned":0,"details":{}},"essay":{"total":'+exam.sections[3].totalScore+',"earned":0,"details":{"'+exam.sections[3].questions[0].id+'":{"score":0,"feedback":"评语","missedPoints":[]}}}},"summary":{"totalEarned":0,"passed":false,"strengths":[],"weaknesses":[],"overallFeedback":""}}';return p}
async function callAI(provider,prompt){var k=localStorage.getItem('ai_key_'+provider);if(!k)throw new Error('请先配置API Key');var ep=AI_ENDPOINTS[provider];if(!ep)throw new Error('不支持的模型');var url,body,headers;if(provider==='gemini'){url=ep.urlBase+'?key='+encodeURIComponent(k);headers={'Content-Type':'application/json'};body=JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.3,maxOutputTokens:8192}})}else{url=ep.url;headers={'Authorization':'Bearer '+k,'Content-Type':'application/json'};body=JSON.stringify({model:ep.model,messages:[{role:'system',content:'你是一个严格的考试评分专家。输出纯JSON，不要任何markdown。'},{role:'user',content:prompt}],temperature:0.3,max_tokens:8192})}var r=await fetch(url,{method:'POST',headers,body});var raw=await r.text();if(!r.ok)throw new Error('AI返回状态码'+r.status+': '+raw.substring(0,200));var j=JSON.parse(raw);var txt='';if(provider==='gemini'){txt=j.candidates?.[0]?.content?.parts?.[0]?.text||''}else{txt=j.choices?.[0]?.message?.content||''}if(!txt)throw new Error('AI返回为空');return txt}
async function startGrading(){var a=collectAnswers();if(!a)return;var pv=document.getElementById('modelSelect').value;var btn=document.getElementById('gradeBtn'),loading=document.getElementById('loadingIndicator'),ra=document.getElementById('resultArea');btn.disabled=true;btn.textContent='评分中...';loading.classList.add('active');ra.classList.remove('visible');try{var prompt=buildPrompt(a);var txt=await callAI(pv,prompt);var clean=txt.replace(/```json\s*/gi,'').replace(/```\s*/g,'').trim();var jm=clean.match(/\{[\s\S]*\}/);if(!jm)throw new Error('AI未返回JSON');var jsonStr=jm[0].replace(/,\s*}/g,'}').replace(/,\s*\]/g,']');var result=JSON.parse(jsonStr);displayResults(result,a)}catch(e){ra.classList.add('visible');document.getElementById('scoreSummary').innerHTML='<div class="empty"><p>❌ '+e.message+'</p></div>'}finally{btn.disabled=false;btn.textContent='AI 评分';loading.classList.remove('active')}}
function switchResultTab(id){document.querySelectorAll('#resultTabs .tab').forEach(function(t){t.classList.toggle('active',t.getAttribute('data-tab')===id)});document.querySelectorAll('.tab-content').forEach(function(t){t.classList.toggle('active',t.id==='tab-'+id)})}
function displayResults(data,answers){var ra=document.getElementById('resultArea');ra.classList.add('visible');WRONG_ANSWERS=[];var s=data.scores;if(!s){document.getElementById('scoreSummary').innerHTML='<div class="empty"><p>⚠ AI返回异常</p></div>';return}var total=(s.singleChoice?.earned||0)+(s.multipleChoice?.earned||0)+(s.fillBlank?.earned||0)+(s.essay?.earned||0);var passed=total>=80;document.getElementById('scoreSummary').innerHTML='<div class="r-card total"><div class="r-card-val">'+total+'</div><div class="r-card-lbl">总分</div><span class="r-pass" style="background:'+(passed?'rgba(22,163,74,0.15)':'rgba(220,38,38,0.15)')+';color:'+(passed?'var(--success)':'var(--danger)')+'">'+(passed?'✅及格':'❌不及格')+'</span></div><div class="r-card"><div class="r-card-val" style="color:#2563eb">'+(s.singleChoice?.earned||0)+'/'+(s.singleChoice?.total||0)+'</div><div class="r-card-lbl">单选</div></div><div class="r-card"><div class="r-card-val" style="color:#dc2626">'+(s.multipleChoice?.earned||0)+'/'+(s.multipleChoice?.total||0)+'</div><div class="r-card-lbl">多选</div></div><div class="r-card"><div class="r-card-val" style="color:#7c3aed">'+(s.fillBlank?.earned||0)+'/'+(s.fillBlank?.total||0)+'</div><div class="r-card-lbl">填空</div></div><div class="r-card"><div class="r-card-val" style="color:#16a34a">'+(s.essay?.earned||0)+'/'+(s.essay?.total||0)+'</div><div class="r-card-lbl">简答</div></div>';
  var dh='',exam=getExam();

  exam.sections[2].questions.forEach(function(q){var ua=(document.getElementById('ans-'+q.id)?.value||'').trim(),ok=ua.toLowerCase()===q.blankAnswer.toLowerCase();dh+='<div class="res-item '+(ok?'correct':'wrong')+'"><div class="res-hdr"><span><b>'+q.id+'</b> '+(q.text.length>50?q.text.substring(0,50)+'…':q.text)+'</span><span style="font-weight:600;color:'+(ok?'var(--success)':'var(--danger)')+'">'+(ok?'+1':'+0')+'</span></div><div class="res-answer">你的答案: <b>'+(ua||'未答')+'</b></div>'+(ok?'':'<div class="res-answer" style="color:var(--success)">正确答案: <b>'+q.blankAnswer+'</b></div>')+'</div>';if(!ok&&ua)WRONG_ANSWERS.push({qid:q.id,text:q.text,yours:ua||'未答',correct:q.blankAnswer,type:'填空'})});
  // 简答题
  if(s.essay?.details){dh+='<div class="sec-hdr essay" style="margin-top:20px"><span>简答题评分详情</span></div>';exam.sections[3].questions.forEach(function(q,i){var d=s.essay.details[q.id]||{score:0,feedback:'AI未评分',missedPoints:[]};var es=d.score||0,ef=d.feedback||'AI未评分',em=d.missedPoints||[];var cl=es/q.maxScore>=0.6?'correct':es/q.maxScore>=0.4?'partial':'wrong';dh+='<div class="res-item '+cl+'"><div class="res-hdr"><span><b>简答'+(i+1)+'（'+q.maxScore+'分）</b></span><span style="font-weight:600;color:'+(cl==='correct'?'var(--success)':cl==='partial'?'var(--warning)':'var(--danger)')+'">'+es+'/'+q.maxScore+'</span></div><div class="res-feedback"><b>AI评语：</b>'+ef+'</div>'+(em.length?'<div class="res-feedback" style="color:var(--danger)"><b>遗漏：</b>'+em.join('、')+'</div>':'')+'</div>';if(es/q.maxScore<0.6)WRONG_ANSWERS.push({qid:q.id,text:q.text,yours:'见AI评分',correct:q.scoringPoints.map(function(p){return'['+p.score+'分]'+p.point}).join('；'),type:'简答'})})}

  switchResultTab('score');

async function submitToFeishu(total,passed,fb){var en=localStorage.getItem('feishu_enable');if(en!=='yes')return;var nm=document.getElementById('feishuName').value.trim();if(!nm){showToast('请先填写主播姓名');return}var dp=document.getElementById('feishuDept').value.trim();try{var api='https://ito-ai-grading.vercel.app/api/submit-score';var r=await fetch(api,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:nm,department:dp,totalScore:total,passed:passed,feedback:fb||'',duration:0,switches:switchCount})});var d=await r.json();if(d.code===0){showToast('✅ 结果已写入飞书')}else{showToast('⚠ 飞书写入失败')}}catch(e){showToast('⚠ 飞书同步失败: '+e.message)}}
function exportResult(){var t=document.querySelector('.r-card.total .r-card-val');var d=document.getElementById('resultDetails').innerText;var fb=document.getElementById('overallFeedback').textContent;var r='ITO评分报告\n评分时间:'+new Date().toLocaleString()+'\n模型:'+document.getElementById('modelSelect').value+'\n总分:'+(t?.textContent||'N/A')+'\n\n--- 详细评分 ---\n'+d+'\n\n--- 综合评语 ---\n'+fb+'\n\n--- ITO AI评分系统 ---';var b=new Blob([r],{type:'text/plain;charset=utf-8'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='ITO评分报告_'+new Date().toISOString().slice(0,10)+'.txt';a.click()}
function clearAll(){if(!confirm('确定清空？'))return;document.querySelectorAll('.q-card .fill-input,.q-card .essay-input').forEach(function(e){e.value=''});document.querySelectorAll('.choice-item').forEach(function(e){e.classList.remove('selected','multi-sel')});document.querySelectorAll('input[type="hidden"]').forEach(function(e){e.value=''})}
function fillSample(){document.querySelectorAll('.choice-item.selected').forEach(function(e){e.classList.remove('selected')});document.querySelectorAll('.choice-item.multi-sel').forEach(function(e){e.classList.remove('multi-sel')});document.querySelectorAll('.fill-input,.essay-input').forEach(function(e){e.value=''});document.querySelectorAll('input[type="hidden"]').forEach(function(e){e.value=''});function c(qid,v){document.querySelectorAll('.choice-item[data-q="'+qid+'"]').forEach(function(e){if(e.getAttribute('data-val')===v)e.click()})}var isF=document.getElementById('examTypeSelect').value==='fixed';if(isF){var s1=['B','B','C','B','C','B','D','C','B','C','B','A','C','C','D'];for(var i=1;i<=15;i++)c('f1q'+i,s1[i-1]);var s2=['ABCE','AC','ABDE','ABCD','ABDE','ABCD','BC','ACE','ABCD','ABD'];for(var i=1;i<=10;i++)s2[i-1].split('').forEach(function(v){c('f2q'+i,v)});var f3=['1690','CORDURA Naturalle','36','前开','瑾紫','0.8','自锁','1.0','分体集成海关','360'];for(var i=1;i<=10;i++)document.getElementById('ans-f3q'+i).value=f3[i-1];var f4=['推荐plus 20寸。可登机免托运；前盖快取电脑保护隐私；颜值匹配职场形象；售后360天换新省心。','WEEKENDER→周末短途；TOTE→商务差旅；BACKPACK→日常通勤。看使用场景选。','结合用户ID/头像/互动揣摩穿搭风格。推荐适合用户的颜色而非百搭色。','25-45岁高频通勤职场人。四快取口袋通勤顺手；主仓分区无需翻找；简约适配多场景。','CORDURA面料+三防涂层；大U框开口+7大分区+鞋仓。360天换新5年维修。'];for(var i=1;i<=5;i++)document.getElementById('ans-f4q'+i).value=f4[i-1]}else{var sa=['C','C','C','C','B','B','B','B','C','B','D','B','C','B','B','A','B','B','C','C','A','B','D','B','D'];for(var i=1;i<=25;i++)c('s1q'+i,sa[i-1]);var ma=['ABDE','ABCE','ABCD','ABCD','ABCE','BC','ABD','BCD','BC','ABDE'];for(var i=1;i<=10;i++)ma[i-1].split('').forEach(function(v){c('s2q'+i,v)});for(var i=1;i<=15;i++)document.getElementById('ans-s3q'+i).value=['16','4','18','1390','36','1590','360','PROTECTION+','7A','拉杆箱插袋系统','2.8','4','1.11','0.8','5'][i-1];var s4=['推荐plus 20寸。登机免托运、前仓电脑快取、证件口袋、颜值高。','周末旅行WEEKENDER、商务TOTE、通勤BACKPACK。按场景选。','20寸独立双仓装电脑；25/29寸双模式站立取物。','自锁拉链拉上锁死不怕滑开。','12L通勤14寸电脑；20L差旅16寸电脑¥1390。'];for(var i=1;i<=5;i++)document.getElementById('ans-s4q'+i).value=s4[i-1]}}
function openConfig(){document.getElementById('configModal').classList.add('active');document.getElementById('feishu-enable').value=localStorage.getItem('feishu_enable')||'no';document.getElementById('feishu-appid').value=localStorage.getItem('feishu_appid')||'';document.getElementById('feishu-secret').value=localStorage.getItem('feishu_secret')||'';document.getElementById('dot-feishu-enable').className=localStorage.getItem('feishu_enable')==='yes'?'dot on':'dot'}
function closeConfig(){document.getElementById('configModal').classList.remove('active')}
function saveConfig(){localStorage.setItem('feishu_enable',document.getElementById('feishu-enable').value);var a=document.getElementById('feishu-appid').value.trim();var s=document.getElementById('feishu-secret').value.trim();if(a)localStorage.setItem('feishu_appid',a);if(s)localStorage.setItem('feishu_secret',s);showToast('已保存');closeConfig()}
init();
