<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITO · AI Agent 培训考试</title>
<style>
  :root {
    --gold: #c9a962; --gold-light: #e8d5a0; --gold-dark: #a88a3e;
    --bg: #faf8f4; --card-bg: #ffffff; --text: #2c2c2c;
    --text-light: #7a7a7a; --border: #eee8dd;
    --red: #d9534f; --shadow: 0 2px 12px rgba(0,0,0,0.06); --radius: 10px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;padding:20px}
  .container{max-width:800px;margin:0 auto}
  .header{text-align:center;padding:30px 20px;background:linear-gradient(135deg,#fff,var(--bg));border-bottom:2px solid var(--gold-light);margin-bottom:20px}
  .header h1{font-size:26px;font-weight:600}.header h1 span{color:var(--gold)}
  .header .subtitle{color:var(--text-light);font-size:14px;margin-top:6px}
  .header .badge{display:inline-block;margin-top:10px;padding:4px 16px;background:var(--gold);color:#fff;border-radius:20px;font-size:12px;font-weight:500}
  .info-form{background:var(--card-bg);border-radius:var(--radius);padding:20px 24px;box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:20px;display:flex;gap:16px;flex-wrap:wrap}
  .info-form .field{flex:1;min-width:180px}
  .info-form label{display:block;font-size:13px;font-weight:500;color:var(--text-light);margin-bottom:4px}
  .info-form input,.info-form select{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-size:14px;outline:none;transition:border .2s;background:var(--bg)}
  .info-form input:focus,.info-form select:focus{border-color:var(--gold)}
  .exam-info{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;font-size:13px;color:var(--text-light)}
  .exam-info span{padding:4px 12px;background:#f5f0e8;border-radius:6px}
  .question{background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);padding:16px 20px;margin-bottom:14px}
  .question .q-header{display:flex;align-items:baseline;gap:8px;margin-bottom:10px;flex-wrap:wrap}
  .question .q-num{color:var(--gold);font-weight:600;font-size:14px;min-width:28px}
  .question .q-text{font-size:14px;font-weight:500;flex:1}
  .question .q-meta{display:flex;gap:6px;margin-left:auto}
  .question .q-tag{font-size:11px;padding:1px 10px;border-radius:10px;background:#f0ede6;color:var(--text-light)}
  .question .q-tag.scene{background:#fef6e6;color:#c9a962}
  .question .q-tag.advanced{background:#f0e6fe;color:#8b5cf6}
  .question .q-score{font-size:12px;color:var(--text-light)}
  .options{display:flex;flex-direction:column;gap:6px}
  .options label,.tf-options label{display:flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:14px;transition:all .15s}
  .options label:hover,.tf-options label:hover{background:#fdfbf7;border-color:var(--gold-light)}
  .options input[type="radio"],.tf-options input[type="radio"]{accent-color:var(--gold)}
  .options label.selected,.tf-options label.selected{background:#fdf8ee;border-color:var(--gold)}
  .tf-options{display:flex;gap:12px}.tf-options label{flex:1;text-align:center;justify-content:center}
  .fill-blank input{width:100%;max-width:400px;padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-size:14px;outline:none;transition:border .2s;background:var(--bg)}
  .fill-blank input:focus{border-color:var(--gold)}
  .submit-area{text-align:center;padding:20px 20px 30px}
  .btn-submit{padding:12px 48px;font-size:16px;font-weight:600;color:#fff;background:var(--gold);border:none;border-radius:8px;cursor:pointer;transition:all .2s;letter-spacing:2px}
  .btn-submit:hover{background:var(--gold-dark);transform:translateY(-1px)}
  .btn-submit:disabled{background:#ccc;cursor:not-allowed;transform:none}
  .btn-reset{padding:8px 24px;font-size:13px;color:var(--text-light);background:transparent;border:1px solid var(--border);border-radius:6px;cursor:pointer;margin-left:12px;transition:all .15s}
  .btn-reset:hover{background:var(--bg)}
  .progress-bar{height:3px;background:var(--border);border-radius:2px;margin:0 0 16px;overflow:hidden}
  .progress-bar .fill{height:100%;background:var(--gold);border-radius:2px;transition:width .3s ease;width:0%}
  .modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:1000;align-items:center;justify-content:center}
  .modal-overlay.show{display:flex}
  .modal{background:var(--card-bg);border-radius:14px;padding:32px 36px;max-width:520px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,0.15);text-align:center;animation:modalIn .3s ease}
  @keyframes modalIn{from{transform:scale(0.9);opacity:0}to{transform:scale(1);opacity:1}}
  .modal .result-icon{font-size:48px;margin-bottom:8px}
  .modal h2{font-size:20px;margin-bottom:4px}
  .modal .score-big{font-size:52px;font-weight:700;color:var(--gold);margin:8px 0}
  .modal .score-big small{font-size:20px;font-weight:400;color:var(--text-light)}
  .modal .rating{display:inline-block;padding:4px 20px;border-radius:20px;font-size:14px;font-weight:600;margin:8px 0 16px}
  .rating.excellent{background:#e6f7e6;color:#3a9d3a}.rating.good{background:#fef6e6;color:#c9a962}
  .rating.pass{background:#fff3e0;color:#e68a2e}.rating.fail{background:#fde8e8;color:var(--red)}
  .modal .detail-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:12px 0;font-size:13px}
  .modal .detail-grid .item{background:var(--bg);padding:8px;border-radius:6px}
  .modal .detail-grid .item .label{color:var(--text-light);font-size:11px}
  .modal .detail-grid .item .val{font-weight:600;font-size:15px;margin-top:2px}
  .modal .btn-close{padding:8px 32px;border:1px solid var(--border);border-radius:6px;background:#fff;cursor:pointer;font-size:14px;margin-top:12px;transition:all .15s}
  .modal .btn-close:hover{background:var(--bg)}
  .error-msg{color:var(--red);font-size:13px;margin-top:8px;display:none}.error-msg.show{display:block}
  .loading{display:none}.loading.show{display:inline-block}
  .spinner{display:inline-block;width:16px;height:16px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media(max-width:600px){.header h1{font-size:20px}.info-form{flex-direction:column}.modal{padding:24px 20px}.modal .detail-grid{grid-template-columns:1fr}.tf-options{flex-direction:column}}
</style>
</head>
<body>
<div class="container">
<div class="header">
  <h1>ITO · <span>AI Agent</span> 培训考试</h1>
  <div class="subtitle">题库50题·随机抽20题·含填空+场景理解题</div>
  <div class="badge">每题5分·满分100分</div>
</div>

<div class="info-form">
  <div class="field"><label>姓名 *</label><input type="text" id="userName" placeholder="请输入姓名" autocomplete="name"></div>
  <div class="field"><label>部门</label><select id="userDept"><option value="">请选择</option><option>电商部</option><option>市场部</option><option>产品部</option><option>运营部</option><option>技术部</option><option>其他</option></select></div>
</div>

<div class="exam-info" id="examInfo"></div>
<div class="progress-bar"><div class="fill" id="progressFill"></div></div>
<div id="questionsContainer"></div>

<div class="submit-area">
  <button class="btn-submit" id="btnSubmit" onclick="submitExam()">提交答卷</button>
  <button class="btn-reset" onclick="location.reload()">重新抽题</button>
  <div class="error-msg" id="errorMsg"></div>
</div>
</div>

<div class="modal-overlay" id="resultModal">
  <div class="modal">
    <div class="result-icon" id="resultIcon">🏆</div>
    <h2 id="resultTitle">考试完成</h2>
    <div class="score-big"><span id="resultScore">0</span><small> / 100</small></div>
    <div class="rating" id="resultRating"></div>
    <div class="detail-grid">
      <div class="item"><div class="label">正确</div><div class="val" id="detailCorrect">0/20</div></div>
      <div class="item"><div class="label">得分</div><div class="val" id="detailScore">0</div></div>
      <div class="item"><div class="label">评级</div><div class="val" id="detailRating">-</div></div>
    </div>
    <div style="font-size:13px;color:#7a7a7a;margin:10px 0" id="resultSuggestion"></div>
    <div style="font-size:12px;color:#bbb" id="syncStatus"></div>
    <button class="btn-close" onclick="closeResult()">关闭</button>
  </div>
</div>

<script>
// ==================== 题库（35题） ====================
const QUESTION_BANK = [
  // ---- 选择题：基础 ----
  { id:'c1', type:'choice', tag:'基础', text:'以下哪个是 AI Agent 最核心的特征？',
    options:['能按预设流程自动执行任务','能自主感知环境、推理决策并执行行动','能处理大量文档和数据','能持续记住所有历史信息'], answer:1 },
  { id:'c2', type:'choice', tag:'基础', text:'Agent 与普通 LLM 对话最主要区别是什么？',
    options:['Agent 能主动向用户发送消息','Agent 可以调用工具和采取行动','Agent 不需要任何提示词','Agent 能回答任意问题'], answer:1 },
  { id:'c3', type:'choice', tag:'基础', text:'以下哪项不属于 Agent 的四大核心组件？',
    options:['LLM（大语言模型）','Tools（工具）','Training Data（训练数据）','Memory（记忆）'], answer:2 },
  { id:'c4', type:'choice', tag:'基础', text:'Agent 中"工具（Tool）"的作用是什么？',
    options:['提供多轮对话能力','调用外部功能（搜索、计算、API）','增强LLM推理能力','存储Agent运行记忆'], answer:1 },
  { id:'c5', type:'choice', tag:'基础', text:'LLM 在 Agent 中扮演什么角色？',
    options:['任务调度器','外部数据连接器','"大脑"——负责推理和决策','运行日志记录器'], answer:2 },
  { id:'c6', type:'choice', tag:'基础', text:'以下哪个最符合 Agent 的基本工作流程？',
    options:['输入→输出→结束','感知→思考→行动→观察→循环','提问→回答→反馈','训练→部署→使用'], answer:1 },
  { id:'c7', type:'choice', tag:'基础', text:'以下哪个场景最适合使用 Agent？',
    options:['固定模板自动回复','多步推理并调用外部工具完成的任务','大批量数据处理','生成固定格式文字'], answer:1 },
  { id:'c8', type:'choice', tag:'基础', text:'Agent 中 System Prompt 的主要作用是？',
    options:['让Agent自动联网搜索','设定角色、行为和约束','控制Agent运行速度','设定Agent超时时间'], answer:1 },
  { id:'c9', type:'choice', tag:'基础', text:'Agent 工作流程中"观察"步骤的目的是什么？',
    options:['向用户展示日志','获取工具调用的返回结果和环境信息','检测其他Agent状态','记录用户操作'], answer:1 },
  { id:'c10', type:'choice', tag:'基础', text:'Agent 使用工具的必要前提是什么？',
    options:['Agent必须有足够多工具可选','工具必须有清晰的输入输出接口定义','工具必须支持网络访问','工具必须用同种语言开发'], answer:1 },
  // ---- 选择题：进阶 ----
  { id:'c11', type:'choice', tag:'进阶', text:'Function Calling 在 Agent 中的作用是？',
    options:['用自然语言描述函数接口','自动选择并调用合适的工具函数','动态注册新功能给Agent','优化工具执行顺序'], answer:1 },
  { id:'c12', type:'choice', tag:'进阶', text:'哪种记忆类型属于 Agent 的短期记忆？',
    options:['向量数据库中的知识','当前对话的上下文','预训练模型参数','用户长期行为画像'], answer:1 },
  { id:'c13', type:'choice', tag:'进阶', text:'在多Agent系统中，Agent间的"协商"主要用于？',
    options:['确定谁来付费','任务冲突和资源分配','选择最佳LLM','统一回复风格'], answer:1 },
  { id:'c14', type:'choice', tag:'进阶', text:'Agent 多次尝试仍无法完成任务时，最佳做法是？',
    options:['无限次自动重试','记录日志后放弃','向用户报告失败并提出替代方案','重启自身进程'], answer:2 },
  { id:'c15', type:'choice', tag:'进阶', text:'Agent 的"反思"机制（Self-Reflection）主要解决什么？',
    options:['自动修复运行时错误','从错误中学习改进后续行动','自动更新版本号','扩充记忆容量'], answer:1 },

  // ---- 判断题：基础 ----
  { id:'j1', type:'judge', tag:'基础', text:'AI Agent 就是普通的 LLM 聊天对话加上自动回复功能。', answer:false },
  { id:'j2', type:'judge', tag:'基础', text:'使用 Agent 必须要有网络连接。', answer:false },
  { id:'j3', type:'judge', tag:'基础', text:'Agent 在调用工具失败后，可以自动重试或选择其他方案。', answer:true },
  { id:'j4', type:'judge', tag:'基础', text:'System Prompt 只需要在第一次交互时设定，后续不会影响 Agent 行为。', answer:false },
  { id:'j5', type:'judge', tag:'基础', text:'Agent 只能处理文本任务，不能处理图片或音频。', answer:false },
  { id:'j6', type:'judge', tag:'基础', text:'Agent 的 System Prompt 中定义的规则是绝对不可违反的。', answer:false },
  { id:'j7', type:'judge', tag:'基础', text:'Agent 在完成任务后应主动向用户报告结果。', answer:true },
  // ---- 判断题：进阶 ----
  { id:'j8', type:'judge', tag:'进阶', text:'Multi-Agent 系统中，每个 Agent 必须使用不同的 LLM。', answer:false },
  { id:'j9', type:'judge', tag:'进阶', text:'使用"思维链"（Chain-of-Thought）提示可以提高推理准确性。', answer:true },
  { id:'j10', type:'judge', tag:'进阶', text:'Agent 越复杂、工具越多，效果就一定越好。', answer:false },

  // ---- 场景分析题 ----
  { id:'s1', type:'choice', tag:'场景', text:'你让Agent写周报，它回复了600字文档但数据全是编造的。最可能的原因是？',
    options:['Agent故意欺骗用户','Agent未联网获取真实数据，LLM幻觉导致编造','周报模板有问题','Prompt写不够详细'], answer:1 },
  { id:'s2', type:'choice', tag:'场景', text:'Agent调用天气API时返回了错误。它应该怎么做？',
    options:['直接说查不到','重试，多次失败则尝试备用API','忽略错误继续执行','停止整个任务'], answer:1 },
  { id:'s3', type:'choice', tag:'场景', text:'你设计客服Agent，用户问"我的订单什么时候到？"。Agent首先该做什么？',
    options:['直接回复预计时间','确认用户身份并获取订单号','问其他问题','转人工'], answer:1 },
  { id:'s4', type:'choice', tag:'场景', text:'Agent同时接到两个任务：查天气 + 订机票。应如何安排？',
    options:['依次执行','先查天气再订票','先订票（涉及付款有时效），再做查询','同时执行'], answer:2 },
  { id:'s5', type:'choice', tag:'场景', text:'客户情绪激动地投诉，Agent的最佳回应是？',
    options:['直接给方案','先共情理解，确认问题，再提供方案','引导走投诉流程','转人工'], answer:1 },
  { id:'s6', type:'choice', tag:'场景', text:'Agent需要访问用户私人数据时，从安全角度最好怎么做？',
    options:['直接访问所有数据','每次访问请求用户授权','只读不写','用完后删除'], answer:1 },
  { id:'s7', type:'choice', tag:'场景', text:'AI英语老师，学生问语法问题但Agent不确定答案，该怎么做？',
    options:['编造合理解释','承认不确定，建议查资料','跳过不回答','转移话题'], answer:1 },
  { id:'s8', type:'choice', tag:'场景', text:'Agent生成危险命令（如删除系统文件），问题出在哪？',
    options:['Agent太聪明','缺乏安全约束的System Prompt和权限控制','代码太难','LLM版本太低'], answer:1 },
  { id:'s9', type:'choice', tag:'场景', text:'设计Multi-Agent处理电商订单，哪种分工最合理？',
    options:['都做同样任务','各司其职：库存/支付/客服分开','一个总揽所有','随机分配'], answer:1 },
  { id:'s10', type:'choice', tag:'场景', text:'用户说"行李箱轮子坏了"。训练不足的Agent直接回复"去维修店修"。问题在哪？',
    options:['回复太长','未确认购买信息和保修状态，未引导售后','语气不好','回复太短'], answer:1 },

  // ---- 填空题：基础 ----
  { id:'f1', type:'fill', tag:'基础', text:'Agent 的四大核心组件包括：LLM、Tools、______ 和 Memory。',
    answers:['工具','Tool'] },
  { id:'f2', type:'fill', tag:'基础', text:'Agent 的工作循环流程是：感知 → ______ → 行动 → 观察 → 循环。',
    answers:['思考','推理','Thinking'] },
  { id:'f3', type:'fill', tag:'基础', text:'Agent 中负责设定角色、行为和约束规则的是 ______。',
    answers:['System Prompt','系统提示','系统提示词'] },
  { id:'f4', type:'fill', tag:'基础', text:'Agent 使用 ______ 机制来判断用户意图并选择合适的工具函数调用。',
    answers:['Function Calling','函数调用','工具调用'] },
  { id:'f5', type:'fill', tag:'基础', text:'Agent 的 ______ 记忆存储长期知识（如向量数据库），短期记忆是当前对话上下文。',
    answers:['长期','长时','外部'] },
  { id:'f6', type:'fill', tag:'基础', text:'Agent 的 ______ 负责保存当前会话历史信息，保证上下文连贯。',
    answers:['记忆','Memory','上下文'] },
  { id:'f7', type:'fill', tag:'基础', text:'______ 是 Agent 用来调用外部功能的接口，例如搜索、计算。',
    answers:['工具','Tool','工具函数','Function'] },
  // ---- 填空题：进阶 ----
  { id:'f8', type:'fill', tag:'进阶', text:'______ 提示技术引导 Agent 逐步推理，提高复杂问题的准确性。',
    answers:['思维链','Chain-of-Thought','CoT','chain of thought'] },
  { id:'f9', type:'fill', tag:'进阶', text:'Agent 的 ______ 机制让它能从失败中学习并改进后续行动。',
    answers:['反思','Self-Reflection','自我反思','self reflection'] },
  { id:'f10', type:'fill', tag:'进阶', text:'在 Multi-Agent 系统中，Agent 间通过 ______ 解决任务冲突和资源分配。',
    answers:['协商','协调','通信','沟通'] },

  // ---- 新增选择题：基础 ----
  { id:'c16', type:'choice', tag:'基础', text:'以下哪种情况 Agent 应该主动向用户请求更多信息？',
    options:['判断到上下文不够明确时','任务描述缺少关键信息时','工具调用返回错误时','涉及隐私时拒绝回答'], answer:1 },
  { id:'c17', type:'choice', tag:'基础', text:'Agent 执行多步任务时，中间结果应该怎么处理？',
    options:['压缩后放入临时缓存','传递给下一步骤作为上下文','持久化到外部数据库','每次都重新计算'], answer:1 },
  // ---- 新增选择题：进阶 ----
  { id:'c18', type:'choice', tag:'进阶', text:'设计 Agent 处理退款申请，以下哪种方案最安全合理？',
    options:['Agent直接调用退款API','Agent核实信息后自动退款','Agent生成工单由人工审核执行','告知用户需联系银行'], answer:2 },
  { id:'c19', type:'choice', tag:'进阶', text:'Agent需要访问多个外部系统时，最推荐的架构是？',
    options:['所有API封装成一个复合工具','每个系统封装独立工具函数按需调用','让Agent动态生成API请求代码','用配置文件管理所有API'], answer:1 },
  { id:'c20', type:'choice', tag:'进阶', text:'以下哪个是评估 Agent 性能的关键指标？',
    options:['平均响应速度','单轮对话的完整度','任务完成率+工具调用准确率+推理合理性','LLM参数量'], answer:2 },
];

const TOTAL_QUESTIONS = 20;
const SCORE_PER_QUESTION = 5;

// ==================== 随机抽题 ====================
function shuffle(arr) {
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}
  return arr;
}

function pickQuestions() {
  const choices = QUESTION_BANK.filter(q => q.type === 'choice' && q.tag !== '场景');
  const scenes = QUESTION_BANK.filter(q => q.tag === '场景');
  const judges = QUESTION_BANK.filter(q => q.type === 'judge');
  const fills = QUESTION_BANK.filter(q => q.type === 'fill');

  const pick = [];
  // 每种题型至少抽到的数量
  pick.push(...shuffle([...fills]).slice(0, 4));      // 填空至少4题
  pick.push(...shuffle([...scenes]).slice(0, 3));       // 场景至少3题
  pick.push(...shuffle([...judges]).slice(0, 5));       // 判断至少5题
  pick.push(...shuffle([...choices]).slice(0, 5));      // 选择至少5题

  // 从所有已抽到的补满20题
  const pickedIds = new Set(pick.map(q => q.id));
  const rest = shuffle(QUESTION_BANK.filter(q => !pickedIds.has(q.id)));
  pick.push(...rest.slice(0, TOTAL_QUESTIONS - pick.length));

  return shuffle(pick);
}

let currentQuestions = [];

// ==================== 渲染 ====================
function renderQuestions() {
  currentQuestions = pickQuestions();

  const info = document.getElementById('examInfo');
  const counts = {};
  currentQuestions.forEach(q => { counts[q.tag] = (counts[q.tag]||0)+1 });
  info.innerHTML = `本次考题：${currentQuestions.length}题` +
    Object.entries(counts).map(([k,v]) => `<span>${k} ${v}题</span>`).join('') +
    `<span>每题${SCORE_PER_QUESTION}分</span>`;

  const container = document.getElementById('questionsContainer');
  container.innerHTML = '';

  currentQuestions.forEach((q, idx) => {
    const num = idx + 1;
    const div = document.createElement('div');
    div.className = 'question';
    div.id = 'q_' + q.id;

    const tagClass = q.tag === '场景' ? 'scene' : q.tag === '进阶' ? 'advanced' : '';

    if (q.type === 'choice') {
      div.innerHTML = `
        <div class="q-header">
          <span class="q-num">${num}.</span>
          <span class="q-text">${q.text}</span>
          <span class="q-tag ${tagClass}">${q.tag}</span>
        </div>
        <div class="options">
          ${q.options.map((opt, oi) =>
            `<label><input type="radio" name="q_${q.id}" value="${oi}"> ${opt}</label>`
          ).join('')}
        </div>`;
    } else if (q.type === 'judge') {
      div.innerHTML = `
        <div class="q-header">
          <span class="q-num">${num}.</span>
          <span class="q-text">${q.text}</span>
          <span class="q-tag ${tagClass}">${q.tag}</span>
        </div>
        <div class="tf-options">
          <label><input type="radio" name="q_${q.id}" value="true"> ✅ 正确</label>
          <label><input type="radio" name="q_${q.id}" value="false"> ❌ 错误</label>
        </div>`;
    } else if (q.type === 'fill') {
      div.innerHTML = `
        <div class="q-header">
          <span class="q-num">${num}.</span>
          <span class="q-text">${q.text}</span>
          <span class="q-tag ${tagClass}">${q.tag}</span>
        </div>
        <div class="fill-blank">
          <input type="text" id="fill_${q.id}" placeholder="请输入答案" autocomplete="off">
        </div>`;
    }

    container.appendChild(div);
  });

  // 绑定选中高亮和进度
  container.querySelectorAll('input[type="radio"]').forEach(r => {
    r.addEventListener('change', function() {
      this.closest('.options')?.querySelectorAll('label')?.forEach(l => l.classList.remove('selected'));
      this.closest('.tf-options')?.querySelectorAll('label')?.forEach(l => l.classList.remove('selected'));
      this.closest('label')?.classList.add('selected');
      updateProgress();
    });
  });
  container.querySelectorAll('.fill-blank input').forEach(inp => {
    inp.addEventListener('input', updateProgress);
  });

  updateProgress();
}

function updateProgress() {
  let done = 0;
  currentQuestions.forEach(q => {
    if (q.type === 'fill') {
      const inp = document.getElementById('fill_' + q.id);
      if (inp && inp.value.trim()) done++;
    } else {
      const sel = document.querySelector(`input[name="q_${q.id}"]:checked`);
      if (sel) done++;
    }
  });
  const pct = Math.round((done / TOTAL_QUESTIONS) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
}

// ==================== 判分 ====================
function gradeExam() {
  const name = document.getElementById('userName').value.trim();
  const dept = document.getElementById('userDept').value;
  if (!name) {
    document.getElementById('errorMsg').textContent = '请填写姓名';
    document.getElementById('errorMsg').classList.add('show');
    return null;
  }
  document.getElementById('errorMsg').classList.remove('show');

  let correct = 0;
  let score = 0;
  const details = [];

  currentQuestions.forEach(q => {
    let isCorrect = false;
    let userAnswer = '';

    if (q.type === 'choice') {
      const sel = document.querySelector(`input[name="q_${q.id}"]:checked`);
      userAnswer = sel ? sel.value : '';
      isCorrect = String(userAnswer) === String(q.answer);
    } else if (q.type === 'judge') {
      const sel = document.querySelector(`input[name="q_${q.id}"]:checked`);
      userAnswer = sel ? sel.value : '';
      isCorrect = (userAnswer === 'true') === q.answer;
    } else if (q.type === 'fill') {
      const inp = document.getElementById('fill_' + q.id);
      userAnswer = inp ? inp.value.trim() : '';
      isCorrect = q.answers.some(a => userAnswer.toLowerCase() === a.toLowerCase());
    }

    if (isCorrect) { correct++; score += SCORE_PER_QUESTION; }
    details.push({ id: q.id, text: q.text, tag: q.tag, userAnswer, correct: isCorrect });
  });

  let rating, suggestion, icon;
  if (score >= 90) { rating='优秀'; suggestion='理解和应用能力都很强！'; icon='🏆'; }
  else if (score >= 70) { rating='良好'; suggestion='大部分掌握，有几个题可以再思考一下。'; icon='👍'; }
  else if (score >= 50) { rating='及格'; suggestion='基础概念还需巩固，建议多联系实际场景理解。'; icon='💪'; }
  else { rating='需补课'; suggestion='建议重新学习 Agent 基础内容。'; icon='📚'; }

  const detailStr = details.map(d =>
    `${d.tag} · ${d.text.substring(0,30)}... ${d.correct ? '✅' : '❌'}`
  ).join(' | ');

  return {
    name, dept: dept || '未填写',
    totalScore: score, correct,
    rating, suggestion, icon,
    detail: `正确${correct}/${TOTAL_QUESTIONS} | ${detailStr}`,
    timestamp: new Date().toISOString(),
  };
}

// ==================== 提交 ====================
async function submitExam() {
  const btn = document.getElementById('btnSubmit');
  if (btn.disabled) return;
  const result = gradeExam();
  if (!result) return;

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>判分中...';

  showResult(result);

  const BACKEND_URL = 'https://ito-ai-grading.vercel.app';
  if (BACKEND_URL) {
    try {
      const resp = await fetch(BACKEND_URL + '/api/submit-exam', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          name: result.name, dept: result.dept,
          totalScore: result.totalScore, rating: result.rating,
          detail: result.detail
        }),
      });
      const data = await resp.json();
      document.getElementById('syncStatus').textContent =
        data.code === 0 ? '✅ 成绩已同步到飞书' : '⚠️ 成绩同步失败';
    } catch(e) {
      document.getElementById('syncStatus').textContent = '⚠️ 同步失败（后端未连接）';
    }
  } else {
    document.getElementById('syncStatus').textContent = '🔶 仅本地判分';
  }

  btn.disabled = false;
  btn.innerHTML = '提交答卷';
}

function showResult(result) {
  document.getElementById('resultScore').textContent = result.totalScore;
  document.getElementById('detailCorrect').textContent = `${result.correct}/${TOTAL_QUESTIONS}`;
  document.getElementById('detailScore').textContent = result.totalScore + '分';
  document.getElementById('detailRating').textContent = result.rating;
  document.getElementById('resultSuggestion').textContent = result.suggestion;
  document.getElementById('resultTitle').textContent = `${result.name}，考试完成！`;

  const ratingEl = document.getElementById('resultRating');
  ratingEl.textContent = result.rating;
  ratingEl.className = 'rating';
  document.getElementById('resultIcon').textContent = result.icon;

  const cls = { '优秀':'excellent', '良好':'good', '及格':'pass', '需补课':'fail' };
  if (cls[result.rating]) ratingEl.classList.add(cls[result.rating]);

  document.getElementById('resultModal').classList.add('show');
}

function closeResult() {
  document.getElementById('resultModal').classList.remove('show');
}

// ==================== 启动 ====================
document.addEventListener('DOMContentLoaded', renderQuestions);
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.activeElement?.tagName !== 'TEXTAREA') submitExam();
});
</script>
